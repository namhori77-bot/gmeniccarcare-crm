              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:7}}>💰 금액</div>
                <input type="number" value={amount} onChange={e=>setAmount(e.target.value)}
                  placeholder="예: 130000" style={iStyle}/>
                <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:7}}>
                  {[80000,100000,130000,160000,200000,300000].map(n=>(
                    <button key={n} onClick={()=>setAmount(String(n))}
                      style={{padding:"4px 10px",borderRadius:6,fontSize:11,cursor:"pointer",
                        background:amount===String(n)?"#1e293b":"#f1f5f9",
                        color:amount===String(n)?"#fff":"#475569",
                        border:`1px solid ${amount===String(n)?"#1e293b":"#e2e8f0"}`,fontWeight:600}}>
                      {(n/10000).toFixed(0)}만
                    </button>
                  ))}
                </div>
                {amount&&<div style={{fontSize:13,color:"#1e293b",fontWeight:700,marginTop:6}}>
                  {formatKRW(Number(String(amount).replace(/[^\d]/g,"")))}
                </div>}
              </div>

              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:7}}>💳 결제</div>
                <div style={{display:"flex",gap:8}}>
                  {["카드","현금"].map(p=>(
                    <button key={p} onClick={()=>setPayment(p)}
                      style={{flex:1,padding:"10px",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer",
                        border:`1.5px solid ${payment===p?"#1e293b":"#e2e8f0"}`,
                        background:payment===p?"#1e293b":"#fff",
                        color:payment===p?"#fff":"#94a3b8",transition:"all 0.15s"}}>
                      {p}
                    </button>
                  ))}
                </div>
              </div>

              <div style={{marginBottom:18}}>
                <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:7}}>📝 메모 (선택)</div>
                <input value={memo} onChange={e=>setMemo(e.target.value)}
                  placeholder="특이사항..." style={iStyle}/>
              </div>

              <button onClick={handleSave}
                style={{width:"100%",padding:"14px",background:"linear-gradient(135deg,#6366f1,#4f46e5)",
                  color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:800,
                  cursor:"pointer",boxShadow:"0 4px 14px rgba(99,102,241,0.4)"}}>
                ✅ 예약 등록
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


// ── NF 공통 필드 ──────────────────────────────────────
function NF({label,children}){
  return(
    <div style={{marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:600,color:"#475569",marginBottom:7}}>{label}</div>
      {children}
    </div>
  );
}

// ── 예약 모달 ─────────────────────────────────────────
function BookingModal({modal,customers,onSave,onDelete,onClose,onAddCustomer}){
  const isAD=modal.slot==="종일";
  const isExtra=modal.slot==="추가";
  const ex=modal.record;
  const [editDate,setEditDate]=useState(ex?.date||modal.date); // 날짜 수정 가능
  const [slotType,setSlotType]=useState(isAD?"종일":isExtra?"추가":"시간");
  const [slotTime,setSlotTime]=useState(isAD||isExtra?null:(ex?.slot||modal.slot));
  const [multiDay,setMultiDay]=useState(Number(ex?.multiDay)||1);
  const [phoneInput,setPhoneInput]=useState("");
  const [custId,setCustId]=useState(ex?.customerId||"");
  const [selectedCar,setSelectedCar]=useState(ex?.carModel||"");
  // 예약구분 - 기존 고객의 bookingType 가져오되 직접 변경 가능
  const [bookingType,setBookingType]=useState(()=>{
    if(ex?.customerId){
      const c=customers.find(c=>c.id===String(ex.customerId)||c.id===ex.customerId);
      return c?.bookingType||"신규";
    }
    return "신규";
  });
  const [services,setServices]=useState(ex?.services||[]);
  const [amount,setAmount]=useState(ex?.amount||"");
  const [payment,setPayment]=useState(ex?.payment||"카드");
  const [memo,setMemo]=useState(ex?.memo||"");

  useEffect(()=>{
    if(ex?.customerId){
      const c=customers.find(c=>c.id===String(ex.customerId)||c.id===ex.customerId);
      if(c){setPhoneInput(c.name||c.phone);setSelectedCar(ex.carModel||c.cars?.[0]||"");setBookingType(c.bookingType||"신규");}
    }
  },[]);

  const searchResults=useMemo(()=>{
    const q=phoneInput.replace(/[^\d]/g,"");
    if(phoneInput.length<2)return[];
    return customers.filter(c=>{
      const cp=(c.phone||"").replace(/[^\d]/g,"");
      return cp.endsWith(q)||cp.includes(q)||(c.name||"").includes(phoneInput);
    }).slice(0,5);
  },[phoneInput,customers]);

  const selCust=customers.find(c=>c.id===custId);
  const toggle=s=>setServices(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);

  function handleSave(){
    if(!custId||!services.length||!amount)return alert("고객, 작업내용, 가격을 입력해주세요.");
    const fs=slotType==="종일"?"종일":slotType==="추가"?"추가":slotTime;
    if(slotType==="시간"&&!fs)return alert("시간을 선택해주세요.");
    onSave({id:ex?.id,customerId:String(custId),date:editDate,slot:fs,multiDay:slotType==="종일"?multiDay:1,services,payment,amount:Number(amount),memo,carModel:selectedCar,bookingType});
  }

  const iStyle={width:"100%",padding:"10px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:13,boxSizing:"border-box",background:"#fff",color:"#0f172a",fontFamily:"'Noto Sans KR',sans-serif"};
  const chip=(active,color)=>({padding:"6px 12px",borderRadius:8,border:`1.5px solid ${active?color||"#1e293b":"#e2e8f0"}`,background:active?color||"#1e293b":"#fff",color:active?"#fff":"#475569",fontSize:12,cursor:"pointer",fontWeight:600,transition:"all 0.15s"});

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.4)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:20,width:"100%",maxWidth:520,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 -8px 32px rgba(0,0,0,0.12)",border:"1px solid #e2e8f0"}} onClick={e=>e.stopPropagation()}>
        <div style={{width:40,height:3,background:"#1e293b",borderRadius:2,margin:"0 auto 16px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,color:"#1e293b"}}>{ex?"EDIT BOOKING":"NEW BOOKING"}</span>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#94a3b8"}}>✕</button>
        </div>

        <NF label="📅 예약날짜">
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <input type="date" value={editDate} onChange={e=>setEditDate(e.target.value)}
              style={{flex:1,padding:"9px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,
                fontSize:14,fontWeight:700,color:"#1e293b",background:"#fff",
                fontFamily:"'Noto Sans KR',sans-serif",boxSizing:"border-box"}}/>
            <span style={{fontSize:13,color:"#64748b",flexShrink:0}}>{WD(editDate)}요일</span>
          </div>
        </NF>

        <NF label="⏰ 예약시간">
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {TIME_SLOTS.map(s=>(
              <button key={s} onClick={()=>{setSlotType("시간");setSlotTime(s);}}
                style={chip(slotType==="시간"&&slotTime===s,SC_STYLE[s]?.border||SC[s])}>{s}</button>
            ))}
            <button onClick={()=>setSlotType("종일")} style={chip(slotType==="종일","#8b5cf6")}>◆ 종일</button>
            <button onClick={()=>setSlotType("추가")}
              style={{...chip(slotType==="추가","#94a3b8"),fontSize:11}}>+ 추가</button>
          </div>
          {slotType==="추가"&&(
            <div style={{marginTop:8,background:"#f8fafc",borderRadius:8,padding:"8px 12px",border:"1px solid #e2e8f0",fontSize:12,color:"#64748b"}}>
              🔧 작업세차 / 응급 / 기타 추가 작업으로 기록됩니다
            </div>
          )}
          {slotType==="종일"&&(
            <div style={{marginTop:10}}>
              <div style={{fontSize:11,fontWeight:600,color:"#475569",marginBottom:7}}>작업 기간</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {[1,2,3,4,5,6,7].map(d=>(
                  <button key={d} onClick={()=>setMultiDay(d)} style={chip(multiDay===d,"#ef4444")}>{d}일</button>
                ))}
              </div>
              {multiDay>1&&<div style={{background:"#fef2f2",borderRadius:7,padding:"7px 10px",fontSize:11,color:"#dc2626",fontWeight:600,marginTop:8,border:"1px solid #fecaca"}}>
                {editDate.replace(/-/g,".")}({WD(editDate)}) ~ {addDays(editDate,multiDay-1).replace(/-/g,".")}({WD(addDays(editDate,multiDay-1))}) · {multiDay}일
              </div>}
            </div>
          )}
        </NF>

        <NF label="👤 전화번호 검색">
          <div style={{position:"relative"}}>
            <div style={{display:"flex",gap:8}}>
              <input placeholder="뒷4자리 또는 고객명" value={phoneInput}
                onChange={e=>{setPhoneInput(e.target.value);setCustId("");setSelectedCar("");}}
                style={{...iStyle,flex:1}}/>
              <button onClick={onAddCustomer} style={{...chip(false),whiteSpace:"nowrap",border:"1.5px solid #e2e8f0"}}>+ 신규</button>
            </div>
            {searchResults.length>0&&!custId&&(
              <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:10,
                background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,overflow:"hidden",boxShadow:"0 8px 24px rgba(0,0,0,0.1)"}}>
                {searchResults.map(c=>(
                  <div key={c.id} onClick={()=>{setCustId(c.id);setPhoneInput(c.name||c.phone);setSelectedCar(c.cars?.[0]||"");}}
                    style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid #f1f5f9"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"}
                    onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                    {c.name&&<div style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{c.name}</div>}
                    <div style={{fontSize:12,color:"#475569",marginTop:c.name?2:0}}>{c.phone}</div>
                    <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{(c.cars||[]).join(", ")||"차종 없음"}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </NF>

        {selCust&&(
          <div style={{background:"#f8fafc",borderRadius:10,padding:"12px 14px",marginBottom:16,border:"1px solid #e2e8f0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div>
                {selCust.name&&<div style={{fontSize:14,fontWeight:700,color:"#0f172a"}}>{selCust.name}</div>}
                <div style={{fontSize:12,color:"#475569",marginTop:selCust.name?2:0}}>{selCust.phone}</div>
              </div>
              <span style={{fontSize:9,fontWeight:700,background:BT[selCust.bookingType]?.bg,color:BT[selCust.bookingType]?.color,padding:"2px 6px",borderRadius:5,border:`1px solid ${BT[selCust.bookingType]?.border}`}}>{selCust.bookingType}</span>
            </div>
            {selCust.cars&&selCust.cars.length>1?(
              <div>
                <div style={{fontSize:11,fontWeight:600,color:"#475569",marginBottom:6}}>🚗 차종 선택</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {selCust.cars.map(car=>(
                    <button key={car} onClick={()=>setSelectedCar(car)}
                      style={{padding:"5px 10px",borderRadius:7,border:"1.5px solid",fontSize:11,cursor:"pointer",fontWeight:600,
                        borderColor:selectedCar===car?"#1e293b":"#e2e8f0",background:selectedCar===car?"#1e293b":"#fff",
                        color:selectedCar===car?"#fff":"#475569"}}>
                      {car}
                    </button>
                  ))}
                </div>
                {selectedCar&&<div style={{fontSize:11,color:"#16a34a",fontWeight:600,marginTop:6}}>✅ {selectedCar}</div>}
              </div>
            ):(
              <div style={{fontSize:13,color:"#64748b"}}>🚗 {selCust.cars?.[0]||"차종 없음"}</div>
            )}
          </div>
        )}

        <NF label="🔧 작업내용">
          <ServiceSearch services={services} setServices={setServices}/>
        </NF>

        <NF label="💰 가격">
          <input type="number" placeholder="예: 80000" value={amount} onChange={e=>setAmount(e.target.value)} style={iStyle}/>
          {amount&&<div style={{fontSize:12,color:"#1e293b",fontWeight:700,marginTop:5}}>{formatKRW(amount)}</div>}
        </NF>

        <NF label="🏷️ 예약구분">
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {BOOKING_TYPES.map(bt=>{
              const btc=BT[bt];
              const active=bookingType===bt;
              return(
                <button key={bt} onClick={()=>setBookingType(bt)}
                  style={{padding:"6px 14px",borderRadius:8,border:`1.5px solid ${active?btc.color:"#e2e8f0"}`,
                    background:active?btc.bg:"#fff",color:active?btc.color:"#94a3b8",
                    fontSize:12,cursor:"pointer",fontWeight:700,transition:"all 0.15s"}}>
                  {bt}
                </button>
              );
            })}
          </div>
        </NF>

        <NF label="💳 결제">
          <div style={{display:"flex",gap:7}}>
            {PAYMENTS.map(p=><button key={p} onClick={()=>setPayment(p)} style={chip(payment===p)}>{p}</button>)}
          </div>
        </NF>

        <NF label="📝 비고">
          <textarea value={memo} onChange={e=>setMemo(e.target.value)} placeholder="특이사항..."
            style={{...iStyle,minHeight:60,resize:"vertical"}}/>
        </NF>

        <div style={{display:"flex",gap:10,marginTop:12}}>
          {ex&&<button onClick={()=>{if(window.confirm("삭제할까요?"))onDelete(ex.id);}}
            style={{padding:"12px 14px",background:"#fff",color:"#ef4444",border:"1.5px solid #fecaca",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>삭제</button>}
          <button onClick={handleSave}
            style={{flex:1,padding:"13px",background:"#1e293b",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>
            저장
          </button>
        </div>
      </div>
    </div>
  );
}

// ── 고객 모달 ─────────────────────────────────────────
function CustomerModal({customer,records,onSave,onDelete,onClose}){
  const [name,setName]=useState(customer?.name||"");
  const [phone,setPhone]=useState(customer?.phone||"");
  const [carsInput,setCarsInput]=useState((customer?.cars||[]).join(", "));
  const [bookingType,setBookingType]=useState(customer?.bookingType||"신규");
  const [memo,setMemo]=useState(customer?.memo||"");
  const iStyle={width:"100%",padding:"10px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:13,boxSizing:"border-box",background:"#fff",color:"#0f172a"};
  function handleSave(){
    if(!phone)return alert("전화번호를 입력해주세요.");
    const cars=carsInput.split(",").map(s=>s.trim()).filter(Boolean);
    onSave({id:customer?.id,name,phone,cars,bookingType,memo});
  }
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.4)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:20,width:"100%",maxWidth:520,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 -8px 32px rgba(0,0,0,0.12)"}} onClick={e=>e.stopPropagation()}>
        <div style={{width:40,height:3,background:"#1e293b",borderRadius:2,margin:"0 auto 16px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,color:"#1e293b"}}>{customer?"EDIT CLIENT":"NEW CLIENT"}</span>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#94a3b8"}}>✕</button>
        </div>
        <NF label="고객명"><input value={name} onChange={e=>setName(e.target.value)} placeholder="홍길동 (선택)" style={iStyle}/></NF>
        <NF label="전화번호 *"><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="010-0000-0000" style={iStyle}/></NF>
        <NF label="차종 (여러 개면 쉼표로 구분)">
          <input value={carsInput} onChange={e=>setCarsInput(e.target.value)} placeholder="아반떼, 포르쉐 카레라" style={iStyle}/>
          {carsInput&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:8}}>
            {carsInput.split(",").map(s=>s.trim()).filter(Boolean).map((car,i)=>(
              <span key={i} style={{fontSize:11,background:"#f1f5f9",color:"#475569",padding:"2px 8px",borderRadius:6,border:"1px solid #e2e8f0",fontWeight:600}}>🚗 {car}</span>
            ))}
          </div>}
        </NF>
        <NF label="예약구분">
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {BOOKING_TYPES.map(bt=>{const c=BT[bt];return(
              <button key={bt} onClick={()=>setBookingType(bt)}
                style={{padding:"6px 12px",borderRadius:8,border:`1.5px solid ${bookingType===bt?c.color:"#e2e8f0"}`,
                  background:bookingType===bt?c.bg:"#fff",color:bookingType===bt?c.color:"#475569",fontSize:12,cursor:"pointer",fontWeight:600}}>{bt}</button>
            );})}
          </div>
        </NF>
        <NF label="메모"><textarea value={memo} onChange={e=>setMemo(e.target.value)} placeholder="특이사항 등..." style={{...iStyle,minHeight:60,resize:"vertical"}}/></NF>
        {records&&records.length>0&&(
          <NF label={`방문이력 · ${records.length}건`}>
            <div style={{maxHeight:140,overflowY:"auto",border:"1px solid #e2e8f0",borderRadius:8}}>
              {[...records].sort((a,b)=>b.date.localeCompare(a.date)).map(r=>(
                <div key={r.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 12px",borderBottom:"1px solid #f1f5f9",gap:6,alignItems:"center"}}>
                  <span style={{fontSize:11,color:"#475569"}}>{r.date} {r.slot}</span>
                  <span style={{fontSize:10,color:"#94a3b8",flex:1,textAlign:"center"}}>{(r.services||[]).join(", ")}</span>
                  <span style={{fontSize:11,fontWeight:700,color:"#1e293b"}}>{formatKRW(r.amount)}</span>
                </div>
              ))}
            </div>
          </NF>
        )}
        <div style={{display:"flex",gap:10,marginTop:16}}>
          {customer&&<button onClick={()=>{if(window.confirm("삭제할까요?"))onDelete(customer.id);}}
            style={{padding:"12px 14px",background:"#fff",color:"#ef4444",border:"1.5px solid #fecaca",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>삭제</button>}
          <button onClick={handleSave}
            style={{flex:1,padding:"13px",background:"#1e293b",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>저장</button>
        </div>
      </div>
    </div>
  );
}

// ── 메인 앱 ──────────────────────────────────────────
// ── 대시보드 컴포넌트 ─────────────────────────────────
function Dashboard({records,customers,getCustomer,onAddBooking,setTab,setBookingModal,setCustModal}){
  const today=todayStr();
  // ── 선택 날짜 (좌우 이동) ──────────────────────────────
  const [selDay,setSelDay]=useState(today);
  const selDate=new Date(selDay);
  const selDt=selDay;
  const selYM=selDay.slice(0,7);

  // ── 미니 캘린더 표시 여부 ──────────────────────────────
  const [showMini,setShowMini]=useState(false);
  const [miniY,setMiniY]=useState(selDate.getFullYear());
  const [miniM,setMiniM]=useState(selDate.getMonth());

  // 날짜 이동할 때 미니캘린더 년월도 동기화
  useEffect(()=>{
    setMiniY(new Date(selDay).getFullYear());
    setMiniM(new Date(selDay).getMonth());
  },[selDay]);

  // ── 선택일 데이터 ──────────────────────────────────────
  const dayRecs=useMemo(()=>records.filter(r=>{
    if(r.slot==="종일") return spanDates(r.date,r.multiDay||1).includes(selDt);
    return r.date===selDt;
  }),[records,selDt]);
  const monthRecs=useMemo(()=>records.filter(r=>r.date.startsWith(selYM)),[records,selYM]);
  const dayAmt=dayRecs.reduce((s,r)=>s+Number(r.amount),0);
  const monthAmt=monthRecs.reduce((s,r)=>s+Number(r.amount),0);
  const slotOrder={"종일":0,"10:00":1,"13:00":2,"16:00":3,"추가":4};
  const daySorted=[...dayRecs].sort((a,b)=>(slotOrder[a.slot]??5)-(slotOrder[b.slot]??5));

  // ── 미니 캘린더 데이터 ────────────────────────────────
  const miniDays=useMemo(()=>getDays(miniY,miniM),[miniY,miniM]);
  // 날짜별 예약 건수 map
  const dayCountMap=useMemo(()=>{
    const m={};
    records.forEach(r=>{
      const d=r.date;
      m[d]=(m[d]||0)+1;
    });
    return m;
  },[records]);

  // ── 헬퍼 ─────────────────────────────────────────────
  const isToday=selDt===today;
  const WDay=["일","월","화","수","목","금","토"][selDate.getDay()];
  const dateLabel=`${selDate.getFullYear()}.${String(selDate.getMonth()+1).padStart(2,"0")}.${String(selDate.getDate()).padStart(2,"0")} (${WDay})`;

  const StatCard=({label,value,sub,gradient,icon})=>(
    <div className="stat-card" style={{background:gradient,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-10,right:-10,fontSize:40,opacity:0.2}}>{icon}</div>
      <div style={{fontSize:11,fontWeight:600,opacity:0.8,marginBottom:6,letterSpacing:0.3}}>{label}</div>
      <div style={{fontSize:20,fontWeight:900,lineHeight:1.2,wordBreak:"break-all",marginBottom:4}}>{value}</div>
      {sub&&<div style={{fontSize:10,opacity:0.75,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sub}</div>}
    </div>
  );

  return(
    <div style={{animation:"fadeUp 0.3s ease"}}>

      {/* ── 날짜 네비게이터 ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:14,position:"relative"}}>
        <button onClick={()=>setSelDay(d=>addDays(d,-1))}
          style={{width:34,height:34,borderRadius:"50%",border:"1.5px solid #e2e8f0",background:"#fff",
            color:"#1e293b",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
            fontWeight:700,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",flexShrink:0}}>‹</button>

        <button onClick={()=>setShowMini(v=>!v)}
          style={{background:"none",border:"none",cursor:"pointer",textAlign:"center",padding:"4px 6px",borderRadius:8,
            transition:"background 0.1s"}}
          onMouseEnter={e=>e.currentTarget.style.background="#f1f5f9"}
          onMouseLeave={e=>e.currentTarget.style.background="none"}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:1.5,color:"#1e293b",lineHeight:1}}>
            {dateLabel}
          </div>
          {isToday&&(
            <div style={{fontSize:10,color:"#6366f1",fontWeight:700,marginTop:2,letterSpacing:0.5}}>● TODAY</div>
          )}
        </button>

        <button onClick={()=>setSelDay(d=>addDays(d,1))}
          style={{width:34,height:34,borderRadius:"50%",border:"1.5px solid #e2e8f0",background:"#fff",
            color:"#1e293b",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
            fontWeight:700,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",flexShrink:0}}>›</button>

        {!isToday&&(
          <button onClick={()=>setSelDay(today)}
            style={{position:"absolute",right:0,fontSize:10,fontWeight:700,color:"#6366f1",
              background:"#ede9fe",border:"none",borderRadius:6,padding:"3px 8px",cursor:"pointer"}}>
            오늘
          </button>
        )}
      </div>

      {/* ── 미니 캘린더 ── */}
      {showMini&&(
        <div style={{background:"#fff",borderRadius:14,border:"1px solid #e2e8f0",
          boxShadow:"0 4px 16px rgba(0,0,0,0.08)",marginBottom:14,overflow:"hidden",
          animation:"fadeUp 0.18s ease"}}>
          {/* 캘린더 헤더 */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
            padding:"10px 14px",borderBottom:"1px solid #f1f5f9",background:"#1e293b"}}>
            <button onClick={()=>{if(miniM===0){setMiniY(y=>y-1);setMiniM(11);}else setMiniM(m=>m-1);}}
              style={{background:"none",border:"none",color:"rgba(255,255,255,0.7)",fontSize:16,cursor:"pointer",
                padding:"2px 6px",borderRadius:5,fontWeight:700}}>‹</button>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:15,color:"#fff",letterSpacing:1.5}}>
              {miniY}.{String(miniM+1).padStart(2,"0")}
            </span>
            <button onClick={()=>{if(miniM===11){setMiniY(y=>y+1);setMiniM(0);}else setMiniM(m=>m+1);}}
              style={{background:"none",border:"none",color:"rgba(255,255,255,0.7)",fontSize:16,cursor:"pointer",
                padding:"2px 6px",borderRadius:5,fontWeight:700}}>›</button>
          </div>
          {/* 요일 헤더 */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"6px 8px 0"}}>
            {["일","월","화","수","목","금","토"].map((d,i)=>(
              <div key={d} style={{textAlign:"center",fontSize:9,fontWeight:700,
                color:i===0?"#ef4444":i===6?"#3b82f6":"#94a3b8",padding:"3px 0"}}>{d}</div>
            ))}
          </div>
          {/* 날짜 그리드 */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"0 8px 10px",gap:2}}>
            {miniDays.map((d,i)=>{
              if(!d) return <div key={`e${i}`}/>;
              const ds=`${miniY}-${String(miniM+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
              const isSel=ds===selDt;
              const isTod=ds===today;
              const cnt=dayCountMap[ds]||0;
              const dow=new Date(ds).getDay();
              return(
                <button key={ds} onClick={()=>{setSelDay(ds);setShowMini(false);}}
                  style={{
                    position:"relative",display:"flex",flexDirection:"column",alignItems:"center",
                    justifyContent:"center",aspectRatio:"1",borderRadius:8,border:"none",cursor:"pointer",
                    fontSize:11,fontWeight:isSel?800:isTod?700:500,
                    background:isSel?"#1e293b":isTod?"#ede9fe":"transparent",
                    color:isSel?"#fff":isTod?"#6366f1":dow===0?"#ef4444":dow===6?"#3b82f6":"#334155",
                    transition:"background 0.12s",padding:"2px 0",
                  }}
                  onMouseEnter={e=>{if(!isSel)e.currentTarget.style.background="#f1f5f9";}}
                  onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background=isTod?"#ede9fe":"transparent";}}>
                  {d}
                  {cnt>0&&(
                    <div style={{
                      width:cnt>=3?18:cnt===2?12:6,height:4,borderRadius:3,marginTop:1,
                      background:isSel?"rgba(255,255,255,0.6)":cnt>=3?"#f59e0b":cnt===2?"#6366f1":"#22c55e",
                    }}/>
                  )}
                </button>
              );
            })}
          </div>
          {/* 범례 */}
          <div style={{display:"flex",gap:10,padding:"0 14px 10px",justifyContent:"flex-end"}}>
            {[["#22c55e","1건"],["#6366f1","2건"],["#f59e0b","3건+"]].map(([c,l])=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:3}}>
                <div style={{width:10,height:4,borderRadius:2,background:c}}/>
                <span style={{fontSize:9,color:"#94a3b8"}}>{l}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── 스탯 카드 ── */}
      <div className="stat-grid" style={{marginBottom:14}}>
        <StatCard label={isToday?"오늘 입고":"당일 입고"} value={`${dayRecs.length}대`}
          sub={`${selYM.replace("-",".")} 월 ${monthRecs.length}대`}
          gradient="linear-gradient(135deg,#667eea,#764ba2)" icon="🚗"/>
        <StatCard label={isToday?"오늘 매출":"당일 매출"} value={formatKRW(dayAmt)}
          sub={`월 ${formatKRW(monthAmt)}`}
          gradient="linear-gradient(135deg,#f093fb,#f5576c)" icon="💰"/>
        <StatCard label="현금"
          value={formatKRW(dayRecs.filter(r=>r.payment==="현금").reduce((s,r)=>s+Number(r.amount),0))}
          sub="당일 현금" gradient="linear-gradient(135deg,#4facfe,#00f2fe)" icon="💵"/>
        <StatCard label="카드"
          value={formatKRW(dayRecs.filter(r=>r.payment==="카드").reduce((s,r)=>s+Number(r.amount),0))}
          sub="당일 카드" gradient="linear-gradient(135deg,#43e97b,#38f9d7)" icon="💳"/>
      </div>

      {/* ── 예약 현황 + 월 요약 ── */}
      <div className="dash-grid">
        {/* 선택일 예약 */}
        <div style={{background:"#fff",borderRadius:14,padding:"16px",border:"1px solid #e2e8f0",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>
              📅 {isToday?"오늘":"당일"} 예약
              {daySorted.length>0&&<span style={{fontSize:11,color:"#94a3b8",marginLeft:6,fontWeight:500}}>{daySorted.length}건</span>}
            </div>
            <button onClick={()=>onAddBooking(selDt)}
              style={{background:"#1e293b",color:"#fff",border:"none",borderRadius:7,padding:"5px 12px",fontSize:11,cursor:"pointer",fontWeight:700}}>
              + 추가
            </button>
          </div>
          {daySorted.length===0?(
            <div style={{textAlign:"center",padding:"30px 0",color:"#cbd5e1"}}>
              <div style={{fontSize:24,marginBottom:8}}>📋</div>
              <div style={{fontSize:13}}>예약이 없습니다</div>
              <button onClick={()=>onAddBooking(selDt)}
                style={{marginTop:10,fontSize:11,color:"#6366f1",background:"#ede9fe",border:"none",
                  borderRadius:7,padding:"5px 14px",cursor:"pointer",fontWeight:700}}>
                등록하기
              </button>
            </div>
          ):(
            daySorted.map(rec=>{
              const cust=getCustomer(rec.customerId);
              const ac=amtColor(rec.amount,cust?.bookingType);
              const ss=SC_STYLE[rec.slot]||SC_STYLE["추가"];
              return(
                <div key={rec.id}
                  onClick={()=>setBookingModal({date:rec.date,slot:rec.slot,record:rec})}
                  style={{display:"flex",alignItems:"flex-start",gap:8,padding:"9px 10px",
                    borderRadius:10,marginBottom:6,background:ac.bg,border:`1px solid ${ac.border}`,cursor:"pointer"}}>
                  <span style={{fontSize:9,fontWeight:700,background:ss.bg,color:ss.text,
                    padding:"2px 5px",borderRadius:5,border:`1px solid ${ss.border}`,
                    flexShrink:0,minWidth:38,textAlign:"center",marginTop:1}}>
                    {rec.slot==="종일"?"종일":rec.slot}
                  </span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:12,color:"#0f172a",
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {cust?.name||cust?.phone||"미등록"}
                    </div>
                    <div style={{fontSize:11,color:"#64748b",marginTop:1,
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {(rec.services||[]).join(", ")}
                    </div>
                  </div>
                  <div style={{fontSize:11,fontWeight:700,color:ac.text,flexShrink:0,marginTop:1}}>
                    {formatKRW(rec.amount)}
                  </div>
                </div>
              );
            })
          )}
        </div>

        {/* 월간 요약 */}
        <div style={{background:"#fff",borderRadius:14,padding:"16px",border:"1px solid #e2e8f0",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>
              📊 {selYM.replace("-",".")} 월간 요약
            </div>
            <button onClick={()=>setTab("analytics")}
              style={{background:"none",border:"1px solid #e2e8f0",color:"#475569",borderRadius:7,
                padding:"5px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>
              분석보기
            </button>
          </div>

          {/* 월 매출 게이지 */}
          {(()=>{
            const now2=new Date();
            const isCurMo=(selYM===`${now2.getFullYear()}-${String(now2.getMonth()+1).padStart(2,"0")}`);
            const dim=new Date(new Date(selYM+"-01").getFullYear(),new Date(selYM+"-01").getMonth()+1,0).getDate();
            const pct=isCurMo?Math.round((now2.getDate()/dim)*100):100;
            const cashAmt=monthRecs.filter(r=>r.payment==="현금").reduce((s,r)=>s+Number(r.amount),0);
            const cardAmt=monthRecs.filter(r=>r.payment==="카드").reduce((s,r)=>s+Number(r.amount),0);
            const byType={};
            monthRecs.forEach(r=>{
              const c=getCustomer(r.customerId);
              const bt=c?.bookingType||"기타";
              byType[bt]=(byType[bt]||0)+1;
            });
            return(
              <>
                <div style={{background:"linear-gradient(135deg,#1e293b,#334155)",borderRadius:12,
                  padding:"14px 16px",marginBottom:12}}>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:6,fontWeight:600}}>
                    MONTHLY REVENUE
                  </div>
                  <div style={{fontSize:22,fontWeight:900,color:"#fff",fontFamily:"'Bebas Neue',sans-serif",
                    letterSpacing:1,marginBottom:10}}>{formatKRW(monthAmt)}</div>
                  <div style={{height:5,background:"rgba(255,255,255,0.15)",borderRadius:3,marginBottom:5}}>
                    <div style={{height:5,background:"linear-gradient(90deg,#6366f1,#a78bfa)",
                      borderRadius:3,width:`${pct}%`,transition:"width 0.5s"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10}}>
                    <span style={{color:"rgba(255,255,255,0.5)"}}>입고 {monthRecs.length}대</span>
                    <span style={{color:"rgba(255,255,255,0.5)"}}>{pct}% {isCurMo?"경과":"완료"}</span>
                  </div>
                </div>

                {/* 현금/카드 */}
                <div style={{display:"flex",gap:8,marginBottom:12}}>
                  {[[cashAmt,"현금","#0ea5e9","#e0f2fe"],[cardAmt,"카드","#8b5cf6","#ede9fe"]].map(([amt,lbl,c,bg])=>(
                    <div key={lbl} style={{flex:1,background:bg,borderRadius:10,padding:"10px 12px",border:`1px solid ${c}22`}}>
                      <div style={{fontSize:10,color:c,fontWeight:700,marginBottom:3}}>{lbl}</div>
                      <div style={{fontSize:13,fontWeight:800,color:"#1e293b"}}>{formatKRW(amt)}</div>
                      <div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>
                        {monthAmt>0?Math.round(amt/monthAmt*100):0}%
                      </div>
                    </div>
                  ))}
                </div>

                {/* 예약구분 */}
                {Object.keys(byType).length>0&&(
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",marginBottom:7,letterSpacing:0.5}}>예약구분</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {Object.entries(byType).sort((a,b)=>b[1]-a[1]).map(([bt,cnt])=>{
                        const btc=BT[bt]||BT["신규"];
                        return(
                          <span key={bt} style={{fontSize:10,fontWeight:700,background:btc.bg,color:btc.color,
                            padding:"2px 8px",borderRadius:6,border:`1px solid ${btc.border}`}}>
                            {bt} {cnt}
                          </span>
                        );
                      })}
                    </div>
                  </div>
                )}
              </>
            );
          })()}
        </div>
      </div>
    </div>
  );
}

function App(){
  const db=window.__db;
  const {customers,records,loading,connected,saveCustomer,deleteCustomer,saveRecord,deleteRecord}=useData(db);
  const [tab,setTab]=useState("dashboard");
  const [sideOpen,setSideOpen]=useState(false); // 모바일 사이드바
  const [selDate,setSelDate]=useState(todayStr());
  const [calY,setCalY]=useState(new Date().getFullYear());
  const [calM,setCalM]=useState(new Date().getMonth());
  const [view,setView]=useState("month");
  const [showSales,setShowSales]=useState(false);
  const [bookingModal,setBookingModal]=useState(null);
  const [custModal,setCustModal]=useState(null);
  const [dayPopup,setDayPopup]=useState(null);
  const [quickBook,setQuickBook]=useState(false);
  const closeSales=useCallback(()=>setShowSales(false),[]);

  // ── 모바일 뒤로가기 핸들러 ─────────────────────────────
  const stateRef = useRef({});
  useEffect(()=>{
    stateRef.current = {tab,sideOpen,bookingModal,custModal,dayPopup,quickBook,showSales};
  });

  useEffect(()=>{
    // 초기 더미 스택 2개 쌓기 (대시보드 진입 시 여유분 확보)
    window.history.pushState({gmenic:1},"","");
    window.history.pushState({gmenic:2},"","");

    const handlePop = (e)=>{
      const s = stateRef.current;
      // 열린 레이어 우선 닫기
      if(s.bookingModal){ setBookingModal(null); window.history.pushState({gmenic:2},"",""); return; }
      if(s.custModal)   { setCustModal(null);    window.history.pushState({gmenic:2},"",""); return; }
      if(s.dayPopup)    { setDayPopup(null);     window.history.pushState({gmenic:2},"",""); return; }
      if(s.quickBook)   { setQuickBook(false);   window.history.pushState({gmenic:2},"",""); return; }
      if(s.sideOpen)    { setSideOpen(false);    window.history.pushState({gmenic:2},"",""); return; }
      if(s.showSales)   { setShowSales(false);   window.history.pushState({gmenic:2},"",""); return; }
      // 대시보드 아닌 탭 → 대시보드
      if(s.tab !== "dashboard"){
        setTab("dashboard");
        window.history.pushState({gmenic:2},"","");
        return;
      }
      // 대시보드에서 → 종료 확인 토스트
      window.history.pushState({gmenic:2},"",""); // 스택 복구 먼저
      setExitToast(true);
      if(exitToastTimer.current) clearTimeout(exitToastTimer.current);
      exitToastTimer.current = setTimeout(()=>setExitToast(false), 2500);
    };

    window.addEventListener("popstate", handlePop);
    return ()=>{ window.removeEventListener("popstate", handlePop); };
  },[]);

  const [exitToast, setExitToast] = useState(false);
  const exitToastTimer = useRef(null);

  function goPrev(){
    if(view==="week"){setSelDate(d=>addDays(d,-7));return;}
    if(view==="first"){setView("second");if(calM===0){setCalY(y=>y-1);setCalM(11);}else setCalM(m=>m-1);return;}
    if(view==="second"){setView("first");return;}
    if(calM===0){setCalY(y=>y-1);setCalM(11);}else setCalM(m=>m-1);
  }
  function goNext(){
    if(view==="week"){setSelDate(d=>addDays(d,7));return;}
    if(view==="first"){setView("second");return;}
    if(view==="second"){setView("first");if(calM===11){setCalY(y=>y+1);setCalM(0);}else setCalM(m=>m+1);return;}
    if(calM===11){setCalY(y=>y+1);setCalM(0);}else setCalM(m=>m+1);
  }

  const calTitle=useMemo(()=>{
    if(view==="week"){const wk=getWeekDates(selDate);return`${wk[0].slice(5).replace("-",".")} ~ ${wk[6].slice(5).replace("-",".")}`;}
    if(view==="first")return`${calY}.${calM+1} 전반`;
    if(view==="second")return`${calY}.${calM+1} 후반`;
    return`${calY}.${String(calM+1).padStart(2,"0")}`;
  },[view,calY,calM,selDate]);

  const calDays=useMemo(()=>{
    if(view==="week")return getWeekDates(selDate);
    if(view==="first")return getHalfDays(calY,calM,"first");
    if(view==="second")return getHalfDays(calY,calM,"second");
    return getDays(calY,calM);
  },[view,calY,calM,selDate]);

  const calendarMap=useMemo(()=>{
    const map={};

    const ensure=(d)=>{
      if(!map[d]) map[d]={allDay:[],time:[]};
    };

    const seenAllDay=new Set();
    records.forEach(r=>{
      const cust=customers.find(c=>c.id===r.customerId||c.id===String(r.customerId));
      const custName=cust?.name||cust?.phone||"";
      const custBT=cust?.bookingType||"";
      const slot=String(r.slot||"").trim();
      const total=Math.max(1,parseInt(r.multiDay)||1);
      const rid=(r.id!==undefined&&r.id!==null&&r.id!=="")?String(r.id):`${r.date}_${r.customerId}_${slot}`;

      if(slot==="종일"){
        spanDates(r.date,total).forEach((d,idx)=>{
          ensure(d);
          const key=`${rid}::${d}`;
          if(seenAllDay.has(key)) return;
          seenAllDay.add(key);
          map[d].allDay.push({
            ...r,id:rid,
            _spanIdx:idx,_spanTotal:total,
            _isFirst:idx===0,_isLast:idx===total-1,
            _custName:custName,_bookingType:custBT,
          });
        });
      } else {
        const d=r.date;
        ensure(d);
        if(map[d].time.some(x=>x.id===rid)) return;
        map[d].time.push({...r,id:rid,_custName:custName,_bookingType:custBT});
      }
    });

    return map;
  },[records,customers]);

  const getCustomer=id=>customers.find(c=>c.id===id||c.id===String(id));
  function getAllDayRec(date){return records.find(r=>{if(r.slot!=="종일")return false;return spanDates(r.date,r.multiDay||1).includes(date);});}
  function getSlotRec(date,slot){
    if(slot==="종일")return records.find(r=>r.date===date&&r.slot==="종일");
    return records.find(r=>r.date===date&&r.slot===slot&&r.slot!=="종일");
  }
  const allDayRec=getAllDayRec(selDate);
  const isBlocked=!!allDayRec;
  const isCont=allDayRec&&allDayRec.date!==selDate;

  if(loading)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:14,background:"#f1f5f9"}}>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:3,color:"#1e293b"}}>G-MENIC CRM</div>
      <div style={{width:60,height:2,background:"#1e293b",borderRadius:1,animation:"pulse 1.5s infinite"}}/>
      <div style={{fontSize:12,color:"#94a3b8",letterSpacing:1}}>{db?"CONNECTING...":"LOADING..."}</div>
    </div>
  );

  const MENU=[
    {id:"dashboard",icon:"📊",label:"대시보드"},
    {id:"calendar",icon:"📅",label:"캘린더"},
    {id:"customers",icon:"👥",label:"고객"},
    {id:"analytics",icon:"📈",label:"분석"},
  ];

  return(
    <div className="app-layout">
      <div className={`sidebar-overlay${sideOpen?" visible":""}`} onClick={()=>setSideOpen(false)}/>

      {/* 사이드바 */}
      <aside className={`sidebar${sideOpen?" open":""}`}>
        <div className="sidebar-logo">
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,color:"#fff",lineHeight:1}}>G-MENIC</div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:3,letterSpacing:1}}>CAR CARE CRM · 해운대</div>
          <div style={{marginTop:8,display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:connected?"#4ade80":"#f87171",display:"inline-block"}}/>
            <span style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>{connected?"Firebase 연결됨":"로컬 모드"}</span>
          </div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section-label">메뉴</div>
          {MENU.map(m=>(
            <button key={m.id} className={`nav-item${tab===m.id?" active":""}`}
              onClick={()=>{setTab(m.id);setSideOpen(false);}}>
              <span className="nav-icon">{m.icon}</span>{m.label}
            </button>
          ))}
          <div className="nav-section-label" style={{marginTop:16}}>빠른 메뉴</div>
          <button className="nav-item" onClick={()=>{setBookingModal({date:todayStr(),slot:"10:00",record:null});setSideOpen(false);}}>
            <span className="nav-icon">➕</span>예약 등록
          </button>

          <button className="nav-item" onClick={()=>{setCustModal("new");setSideOpen(false);}}>
            <span className="nav-icon">👤</span>신규 고객
          </button>
          <button className="nav-item" onClick={()=>setShowSales(v=>!v)}>
            <span className="nav-icon">💰</span>매출 현황
          </button>
        </nav>
        <div style={{padding:"12px 16px",borderTop:"1px solid rgba(255,255,255,0.07)",fontSize:11,color:"rgba(255,255,255,0.35)",textAlign:"center"}}>
          {todayStr().replace(/-/g,".")} {WD(todayStr())}
        </div>
      </aside>

      {/* 메인 영역 */}
      <div className="main-wrap">
        {/* 상단 바 */}
        <div className="topbar">
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>setSideOpen(v=>!v)}
              className="mobile-menu-btn"
              style={{background:"none",border:"1px solid #e2e8f0",borderRadius:7,fontSize:18,cursor:"pointer",color:"#475569",padding:"4px 10px",fontWeight:700,lineHeight:1}}>
              ☰
            </button>
            <div style={{fontWeight:700,fontSize:15,color:"#1e293b"}}>{MENU.find(m=>m.id===tab)?.icon} {MENU.find(m=>m.id===tab)?.label}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:12,color:"#94a3b8"}}>{todayStr().slice(5).replace("-",".")} {WD(todayStr())}</div>
          </div>
        </div>

        {showSales&&<SalesPanel records={records} selectedDate={selDate} calYear={calY} calMonth={calM} onClose={closeSales}/>}

        <div className="page-content">

          {/* 대시보드 */}
          {tab==="dashboard"&&(
            <Dashboard records={records} customers={customers} getCustomer={getCustomer}
              onAddBooking={date=>setBookingModal({date,slot:"10:00",record:null})}
              setTab={setTab} setBookingModal={setBookingModal} setCustModal={setCustModal}/>
          )}

          {/* 캘린더 */}
          {tab==="calendar"&&(
            <div style={{animation:"fadeUp 0.3s ease"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,gap:8}}>
                <div style={{display:"flex",background:"#fff",borderRadius:8,padding:2,gap:1,border:"1px solid #e2e8f0"}}>
                  {[["month","월"],["first","전반"],["second","후반"],["week","주"]].map(([v,l])=>(
                    <button key={v} onClick={()=>setView(v)}
                      style={{padding:"5px 10px",border:"none",fontSize:11,fontWeight:700,cursor:"pointer",borderRadius:6,
                        background:view===v?"#1e293b":"none",color:view===v?"#fff":"#94a3b8",transition:"all 0.15s"}}>{l}</button>
                  ))}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <button onClick={goPrev} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:7,fontSize:16,cursor:"pointer",color:"#1e293b",padding:"4px 10px",fontWeight:700}}>‹</button>
                  <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color:"#1e293b",minWidth:110,textAlign:"center",letterSpacing:1}}>{calTitle}</span>
                  <button onClick={goNext} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:7,fontSize:16,cursor:"pointer",color:"#1e293b",padding:"4px 10px",fontWeight:700}}>›</button>
                </div>
              </div>
              <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
                {[["~13만","#38bdf8","#e0f2fe"],["16~20만","#eab308","#fefce8"],["20~50만","#fde047","#fefce8"],["50만↑","#fb7185","#fff1f2"],["지메닉","#f97316","#fff7ed"],["지메닉10만↑","#fdba74","#fff7ed"]].map(([l,c,bg])=>(
                  <span key={l} style={{fontSize:9,background:bg,padding:"2px 7px",borderRadius:4,border:`1px solid ${c}`,fontWeight:700,color:c}}>{l}</span>
                ))}
                <span style={{fontSize:9,color:"#94a3b8"}}>종일도 동일</span>
              </div>
              <div className="pc-split">
                <div>
                  <div style={{borderRadius:12,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",marginBottom:14,border:"1px solid #e2e8f0"}}>
                    <BigCalendar days={calDays} calYear={calY} calMonth={calM} calendarMap={calendarMap}
                      isWeek={view==="week"} onSelectDate={setSelDate}
                      onAddBooking={date=>setBookingModal({date,slot:"10:00",record:null})}
                      onDatePopup={date=>{setSelDate(date);setDayPopup(date);}}
                      selectedDate={selDate}/>
                  </div>
                </div>
                <div className="pc-sticky">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div>
                      <span style={{fontSize:15,fontWeight:700,color:"#1e293b"}}>{selDate.replace(/-/g,".")}</span>
                      <span style={{fontSize:12,color:"#94a3b8",marginLeft:6}}>{WD(selDate)}요일</span>
                    </div>
                    <button onClick={()=>setBookingModal({date:selDate,slot:"10:00",record:null})}
                      style={{background:"#1e293b",color:"#fff",border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,cursor:"pointer",fontWeight:700}}>+ 예약 추가</button>
                  </div>
                  {isBlocked&&isCont&&(
                    <div onClick={()=>setBookingModal({date:allDayRec.date,slot:"종일",record:allDayRec})}
                      style={{display:"flex",alignItems:"center",gap:10,background:"#faf5ff",borderRadius:12,padding:"12px 14px",marginBottom:8,border:"1px solid #e9d5ff",cursor:"pointer"}}>
                      <div style={{fontSize:18}}>🔧</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,color:"#7c3aed",fontSize:13}}>연속 작업 진행중</div>
                        <div style={{fontSize:12,color:"#6d28d9",marginTop:2}}>{getCustomer(allDayRec.customerId)?.name||allDayRec.customerId} · {(allDayRec.services||[]).join(", ")}</div>
                        <div style={{fontSize:11,color:"#8b5cf6",marginTop:1}}>📅 {allDayRec.date} ~ {addDays(allDayRec.date,(allDayRec.multiDay||1)-1)}</div>
                      </div>
                    </div>
                  )}
                  {!isCont&&(()=>{
                    const rec=getSlotRec(selDate,"종일"),cust=rec?getCustomer(rec.customerId):null;
                    const btc=cust?BT[cust.bookingType]:null;
                    return(
                      <div onClick={()=>setBookingModal({date:selDate,slot:"종일",record:rec||null})}
                        style={{borderRadius:12,padding:"12px 14px",marginBottom:8,cursor:"pointer",
                          background:rec?"#faf5ff":"#fff",border:rec?"1.5px solid #c4b5fd":"1.5px dashed #e2e8f0"}}>
                        {rec&&cust?(
                          <>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                              <div style={{display:"flex",gap:6}}>
                                <span style={{fontSize:10,fontWeight:700,background:"#ede9fe",color:"#7c3aed",padding:"2px 8px",borderRadius:6,border:"1px solid #c4b5fd"}}>◆ 종일</span>
                                {rec.multiDay>1&&<span style={{fontSize:10,fontWeight:700,background:"#fef2f2",color:"#dc2626",padding:"2px 8px",borderRadius:6,border:"1px solid #fecaca"}}>{rec.multiDay}일</span>}
                              </div>
                              {btc&&<span style={{fontSize:9,fontWeight:700,background:btc.bg,color:btc.color,padding:"2px 6px",borderRadius:5,border:`1px solid ${btc.border}`}}>{cust.bookingType}</span>}
                            </div>
                            <div style={{fontWeight:700,fontSize:15,color:"#1e293b",marginTop:8}}>{cust.name||cust.phone}</div>
                            {cust.name&&<div style={{fontSize:11,color:"#94a3b8",marginTop:1}}>{cust.phone}</div>}
                            <div style={{fontSize:12,color:"#475569",marginTop:2}}>{rec.carModel||(cust.cars||[])[0]||""} · {(rec.services||[]).join(", ")}</div>
                            <div style={{fontSize:13,color:"#1e293b",fontWeight:700,marginTop:4}}>{formatKRW(rec.amount)} · {rec.payment}</div>
                          </>
                        ):null}
                      </div>
                    );
                  })()}

                  {TIME_SLOTS.map(slot=>{
                    const ss=SC_STYLE[slot];
                    const rec=records.filter(r=>r.date===selDate&&r.slot===slot)[0]||null;
                    const cust=rec?getCustomer(rec.customerId):null;
                    const blocked=isBlocked&&!rec;
                    const btc=cust?BT[cust.bookingType]:null;
                    const ac=rec?amtColor(rec.amount,cust?.bookingType):null;
                    return(
                      <div key={slot} onClick={()=>{if(!blocked)setBookingModal({date:selDate,slot,record:rec||null});}}
                        style={{background:rec?ac.bg:ss.bg,borderRadius:12,padding:"11px 14px",marginBottom:7,
                          display:"flex",alignItems:"center",gap:12,border:`1.5px solid ${rec?ac.border:ss.border}`,
                          cursor:blocked?"not-allowed":"pointer",opacity:blocked?0.35:1}}>
                        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,minWidth:42,color:ss.text,
                          background:ss.bg,borderRadius:6,padding:"2px 6px",border:`1px solid ${ss.border}`,textAlign:"center",flexShrink:0}}>
                          {slot}
                        </div>
                        {blocked?<div style={{color:"#cbd5e1",fontSize:12}}>🔒 종일 작업중</div>
                        :rec&&cust?(
                          <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                              <span style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{cust.name||cust.phone}</span>
                              {cust.name&&<span style={{fontSize:10,color:"#94a3b8"}}>{cust.phone}</span>}
                              {btc&&<span style={{fontSize:9,fontWeight:700,background:btc.bg,color:btc.color,padding:"1px 5px",borderRadius:4,border:`1px solid ${btc.border}`}}>{cust.bookingType}</span>}
                            </div>
                            <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{rec.carModel||(cust.cars||[])[0]||""} · {(rec.services||[]).join(", ")}</div>
                            <div style={{fontSize:12,fontWeight:700,marginTop:2,color:ac.text}}>{formatKRW(rec.amount)} · {rec.payment}</div>
                            {rec.memo&&<div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>📝 {rec.memo}</div>}
                          </div>
                        ):<div style={{color:ss.text,fontSize:12,opacity:0.5}}>+ 예약 등록</div>}
                      </div>
                    );
                  })}

                  {records.filter(r=>r.date===selDate&&r.slot==="추가").map(rec=>{
                    const cust=getCustomer(rec.customerId);
                    const ac=amtColor(rec.amount,cust?.bookingType);
                    const ss=SC_STYLE["추가"];
                    return(
                      <div key={rec.id} onClick={()=>setBookingModal({date:selDate,slot:"추가",record:rec})}
                        style={{background:ac.bg,borderRadius:12,padding:"11px 14px",marginBottom:7,
                          display:"flex",alignItems:"center",gap:12,border:`1.5px solid ${ac.border}`,cursor:"pointer"}}>
                        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:12,minWidth:42,color:ss.text,
                          background:ss.bg,borderRadius:6,padding:"2px 4px",border:`1px solid ${ss.border}`,textAlign:"center"}}>추가</div>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{cust?.name||cust?.phone||"고객"}</div>
                          <div style={{fontSize:11,color:"#64748b",marginTop:1}}>{(rec.services||[]).join(", ")}</div>
                          <div style={{fontSize:12,fontWeight:700,marginTop:1,color:ac.text}}>{formatKRW(rec.amount)}</div>
                        </div>
                      </div>
                    );
                  })}

                </div>
              </div>
            </div>
          )}

          {/* 고객 */}
          {tab==="customers"&&(
            <div style={{animation:"fadeUp 0.3s ease"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
                <div>
                  <div style={{fontSize:20,fontWeight:800,color:"#1e293b"}}>👥 고객 관리</div>
                  <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{customers.length}명 등록</div>
                </div>
                <button onClick={()=>setCustModal("new")}
                  style={{background:"#1e293b",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,cursor:"pointer",fontWeight:700}}>
                  + 신규 등록
                </button>
              </div>
              <CustomerSearch customers={customers} records={records} onEdit={c=>setCustModal(c)}/>
            </div>
          )}

          {/* 분석 */}
          {tab==="analytics"&&(
            <AnalyticsTab records={records} customers={customers} getCustomer={getCustomer}/>
          )}

        </div>
      </div>

      {/* 뒤로가기 종료 토스트 */}
      {exitToast&&(
        <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",
          background:"rgba(15,23,42,0.88)",color:"#fff",padding:"12px 24px",
          borderRadius:20,fontSize:13,fontWeight:600,zIndex:9999,
          boxShadow:"0 4px 20px rgba(0,0,0,0.3)",whiteSpace:"nowrap",
          display:"flex",alignItems:"center",gap:10}}>
          <span>📱</span>
          <span>한 번 더 누르면 앱이 종료됩니다</span>
        </div>
      )}
      <button className="fab-quick" onClick={()=>setQuickBook(true)} title="빠른 예약">⚡</button>
      {quickBook&&(
        <QuickBookModal customers={customers}
          onSave={async d=>{await saveRecord(d);setQuickBook(false);}}
          onClose={()=>setQuickBook(false)}/>
      )}
      {dayPopup&&(
        <DayPopup date={dayPopup} records={records} customers={customers} getCustomer={getCustomer}
          onClose={()=>setDayPopup(null)}
          onEdit={rec=>{setDayPopup(null);setBookingModal({date:rec.date,slot:rec.slot,record:rec});}}
          onDelete={async id=>{await deleteRecord(id);setDayPopup(null);}}
          onAdd={date=>{setBookingModal({date,slot:"10:00",record:null});}}/>
      )}
      {bookingModal&&(
        <BookingModal modal={bookingModal} customers={customers}
          onSave={async d=>{await saveRecord(d);setBookingModal(null);}}
          onDelete={async id=>{await deleteRecord(id);setBookingModal(null);}}
          onClose={()=>setBookingModal(null)}
          onAddCustomer={()=>{setBookingModal(null);setCustModal("new");}}/>
      )}
      {custModal&&(
        <CustomerModal
          customer={custModal==="new"?null:custModal}
          records={records.filter(r=>custModal!=="new"&&(r.customerId===custModal.id||r.customerId===String(custModal.id)))}
          onSave={async d=>{await saveCustomer(d);setCustModal(null);}}
          onDelete={async id=>{await deleteCustomer(id);setCustModal(null);}}
          onClose={()=>setCustModal(null)}/>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
