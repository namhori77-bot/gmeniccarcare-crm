<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="version" content="20260415075035"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no"/>
  <title>G-MENIC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script crossorigin="anonymous" src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script crossorigin="anonymous" src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{
      touch-action:manipulation;
      -webkit-text-size-adjust:100%;
      -ms-text-size-adjust:100%;
      overscroll-behavior:none;
    }
    *{-webkit-tap-highlight-color:transparent;}
    body{font-family:'Noto Sans KR',sans-serif;background:#f1f5f9;color:#1e293b;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px;}

    /* 레이아웃 */
    .layout{display:flex;min-height:100vh;}
    .sidebar{width:200px;min-width:200px;background:#0f172a;display:flex;flex-direction:column;
      position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform 0.25s;}
    .main{margin-left:200px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
    .topbar{background:#fff;border-bottom:1px solid #e2e8f0;height:52px;display:flex;
      align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:50;}
    .content{padding:16px 20px;flex:1;}

    /* 사이드바 */
    .sb-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,0.07);}
    .sb-nav{padding:10px 8px;flex:1;overflow-y:auto;}
    .sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;
      color:rgba(255,255,255,0.5);font-size:13px;font-weight:600;cursor:pointer;
      background:none;border:none;width:100%;text-align:left;transition:all 0.15s;margin-bottom:2px;}
    .sb-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85);}
    .sb-item.active{background:rgba(255,255,255,0.12);color:#fff;}
    .sb-item-icon{font-size:15px;width:20px;text-align:center;}
    .sb-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.07);font-size:10px;color:rgba(255,255,255,0.3);}

    /* 로그인 */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);padding:20px;}
    .login-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;padding:40px 32px;width:100%;max-width:360px;backdrop-filter:blur(10px);}
    .login-inp{width:100%;padding:12px 14px;background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;font-size:14px;
      outline:none;font-family:'Noto Sans KR',sans-serif;transition:border 0.2s;}
    .login-inp:focus{border-color:rgba(255,255,255,0.4);}
    .login-inp::placeholder{color:rgba(255,255,255,0.25);}
    .login-btn{width:100%;padding:13px;background:#1e40af;border:none;border-radius:10px;
      color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
      transition:background 0.2s;margin-top:4px;}
    .login-btn:hover{background:#1d4ed8;}

    /* 카드 */
    .card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:16px;margin-bottom:12px;}
    
    /* 캘린더 */
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e2e8f0;}
    .cal-head{background:#f8fafc;text-align:center;padding:8px 0;font-size:9px;font-weight:700;
      letter-spacing:1px;font-family:'Bebas Neue',sans-serif;}
    .cal-cell{background:#fff;padding:5px 4px;cursor:pointer;min-height:110px;transition:background 0.1s;}
    .cal-cell:hover{background:#f8fafc;}
    .cal-cell.today{border-top:2px solid #f59e0b;background:#fffbeb;}
    .cal-cell.selected{background:#1e293b !important;border-top:2px solid #1e293b;}
    .cal-cell.empty{background:#f8fafc;cursor:default;}

    /* PC 캘린더 */
    @media(min-width:768px){
      .cal-cell{min-height:calc((100vh - 220px) / var(--week-count, 5));}
      .pc-split{display:grid;grid-template-columns:1fr 300px;gap:12px;align-items:start;}

    }

    /* 모바일 */
    .mob-menu-btn{display:none;}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;}
    @media(max-width:767px){
      /* ── 기본 레이아웃 ── */
      .sidebar{transform:translateX(-200px);}
      .sidebar.open{transform:translateX(0);}
      .overlay.show{display:block;}
      .main{margin-left:0;}
      .mob-menu-btn{display:flex;align-items:center;justify-content:center;}
      .pc-split{display:block;}

      /* ── 콘텐츠 패딩 최소화 ── */
      .content{padding:6px 8px !important;}

      /* ── 대시보드: 3열 stat 카드 ── */
      .stat-grid{grid-template-columns:repeat(3,1fr) !important;gap:6px !important;margin-bottom:10px !important;}
      .stat-card{padding:8px 6px !important;border-radius:10px !important;}
      .stat-card>div:first-child{font-size:9px !important;}
      .stat-card>div:last-child{font-size:13px !important;}

      /* ── 캘린더: 좌우 스와이프만 허용 ── */
      .cal-wrap{
        overflow-x:auto !important;
        overflow-y:hidden !important;
        -webkit-overflow-scrolling:touch !important;
        touch-action:pan-x !important;
        will-change:scroll-position;
      }

      /* ── 고객: 1열 꽉차게 ── */
      .cust-grid{grid-template-columns:1fr !important;overflow:hidden;}
      .cust-grid>div{width:100% !important;box-sizing:border-box !important;}
      .cust-grid>div{padding:8px 10px !important;}
      .cust-grid .cust-name{font-size:14px !important;}
      .cust-grid .cust-sub{font-size:11px !important;}

      /* ── 분석: 1열 ── */
      .analytics-3col{grid-template-columns:1fr !important;}

      /* ── 모달: 하단 풀스크린 ── */
      .modal{
        max-width:100% !important;
        width:100% !important;
        margin:0 !important;
        border-radius:16px 16px 0 0 !important;
        max-height:92vh !important;
      }
      .modal-bg{
        padding:0 !important;
        align-items:flex-end !important;
      }

      /* ── card 패딩 ── */
      .card{padding:12px !important;}
    }

    /* 모달 */
    .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,0.6);z-index:200;
      display:flex;align-items:center;justify-content:center;padding:16px;}
    .modal{background:#fff;border-radius:16px;width:100%;max-width:480px;
      max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
    .modal-head{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center;}
    .modal-body{padding:16px 20px 20px;}

    /* 인풋 */
    .inp{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;
      font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border 0.15s;}
    .inp:focus{border-color:#3b82f6;}
    .label{font-size:11px;font-weight:700;color:#475569;margin-bottom:5px;display:block;}

    /* 버튼 */
    .btn-primary{background:#1e293b;color:#fff;border:none;border-radius:8px;padding:11px 20px;
      font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
    .btn-secondary{background:#fff;color:#64748b;border:1.5px solid #e2e8f0;border-radius:8px;
      padding:11px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
    .btn-danger{background:#fff;color:#ef4444;border:1.5px solid #fecaca;border-radius:8px;
      padding:11px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

    /* 칩 */
    .chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;
      border:1.5px solid #e2e8f0;background:#fff;color:#94a3b8;transition:all 0.15s;}
    .chip.active{background:#1e293b;color:#fff;border-color:#1e293b;}

    /* 예약 슬롯 색상 */
    .slot-10{background:#eff6ff;border-left:3px solid #3b82f6;color:#1d4ed8;}
    .slot-13{background:#fffbeb;border-left:3px solid #f59e0b;color:#b45309;}
    .slot-16{background:#f0fdf4;border-left:3px solid #22c55e;color:#15803d;}
    .slot-all{background:#faf5ff;border-left:3px solid #8b5cf6;color:#6d28d9;}
    .amt-low{background:#e0f2fe;border-left:3px solid #38bdf8;color:#0369a1;}
    .amt-mid{background:#fef9c3;border-left:3px solid #facc15;color:#a16207;}
    .amt-high{background:#fefce8;border-left:3px solid #fde047;color:#854d0e;}
    .amt-top{background:#dcfce7;border-left:3px solid #4ade80;color:#15803d;}
    .amt-gmenic{background:#fff7ed;border-left:3px solid #fb923c;color:#c2410c;}

    /* 토스트 */
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      background:rgba(15,23,42,0.9);color:#fff;padding:12px 24px;border-radius:20px;
      font-size:13px;font-weight:600;z-index:999;white-space:nowrap;}

    /* 대시보드 */
    .stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px;}
    .stat-card{border-radius:12px;padding:14px 12px;color:#fff;}
    @media(max-width:767px){.stat-grid{grid-template-columns:repeat(3,1fr);}}

    /* FAB */
    .fab{display:none;position:fixed;bottom:24px;right:20px;z-index:90;width:56px;height:56px;
      border-radius:50%;background:#1e293b;color:#fff;font-size:22px;border:none;cursor:pointer;
      align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,0.3);}
    @media(max-width:767px){.fab{display:flex;}}

    @keyframes slideInRight{from{transform:translateX(100%);}to{transform:translateX(0);}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .fade-in{animation:fadeIn 0.25s ease;}
  </style>
<script>
// 핀치줌 완전 차단
document.addEventListener('touchstart', function(e){if(e.touches.length>1)e.preventDefault();},{passive:false});
document.addEventListener('touchmove', function(e){if(e.touches.length>1)e.preventDefault();},{passive:false});
var lastTouch=0;
document.addEventListener('touchend',function(e){
  var now=Date.now();
  if(now-lastTouch<300)e.preventDefault();
  lastTouch=now;
},{passive:false});
</script>
</head>

const addDays=(d,n)=>{const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);};

function spanDates(start,n){
  return Array.from({length:Math.max(1,n)},(_,i)=>addDays(start,i));
}
function getDays(y,m){
  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();
  const arr=Array(first).fill(null);
  for(let i=1;i<=last;i++) arr.push(i);
  return arr;
}
function getHalfDays(y,m,half){
  const last=new Date(y,m+1,0).getDate();
  const start=half==="first"?1:Math.floor(last/2)+1;
  const end=half==="first"?Math.floor(last/2):last;
  const startDow=new Date(y,m,start).getDay();
  const arr=Array(startDow).fill(null);
  for(let i=start;i<=end;i++) arr.push(i);
  return arr;
}
function getWeekDates(base){
  const d=new Date(base);
  const dow=d.getDay();
  const sun=new Date(d);sun.setDate(d.getDate()-dow);
  return Array.from({length:7},(_,i)=>{const x=new Date(sun);x.setDate(sun.getDate()+i);return x.toISOString().slice(0,10);});
}

// ── Firebase 데이터 훅 ───────────────────────────────────
function useData(db){
  const [customers,setCustomers]=useState([]);
  const [records,setRecords]=useState([]);
  const [loading,setLoading]=useState(true);
  const [connected,setConnected]=useState(false);

  useEffect(()=>{
    if(db){
      Promise.all([
        db.collection("customers").get().then(s=>s.docs.map(d=>({...d.data(),id:d.id}))),
        db.collection("records").get().then(s=>s.docs.map(d=>({...d.data(),id:d.id,amount:Number(d.data().amount||0)})))
      ]).then(([c,r])=>{setCustomers(c);setRecords(r);setConnected(true);setLoading(false);})
        .catch(()=>{loadLocal();});
    } else loadLocal();
  },[db]);

  function loadLocal(){
    setCustomers(JSON.parse(localStorage.getItem("crm_c")||"[]"));
    setRecords(JSON.parse(localStorage.getItem("crm_r")||"[]"));
    setLoading(false);
  }

  async function saveCustomer(data){
    const id=String(data.id||Date.now());
    const item={...data,id};
    setCustomers(prev=>prev.find(c=>c.id===id)?prev.map(c=>c.id===id?item:c):[...prev,item]);
    if(db){const{id:_,...r}=item;await db.collection("customers").doc(id).set(r);}
    else localStorage.setItem("crm_c",JSON.stringify(customers));
  }
  async function deleteCustomer(id){
    const sid=String(id);
    setCustomers(prev=>prev.filter(c=>c.id!==sid));
    setRecords(prev=>prev.filter(r=>r.customerId!==sid));
    if(db) await db.collection("customers").doc(sid).delete();
  }
  async function saveRecord(data){
    const id=String(data.id||Date.now());
    const item={...data,id,customerId:String(data.customerId),amount:Number(data.amount||0)};
    setRecords(prev=>prev.find(r=>r.id===id)?prev.map(r=>r.id===id?item:r):[...prev,item]);
    if(db){const{id:_,...r}=item;await db.collection("records").doc(id).set(r);}
  }
  async function deleteRecord(id){
    const sid=String(id);
    setRecords(prev=>prev.filter(r=>r.id!==sid));
    if(db) await db.collection("records").doc(sid).delete();
  }
  return{customers,records,loading,connected,saveCustomer,deleteCustomer,saveRecord,deleteRecord};
}

// ── 계정관리 모달 ─────────────────────────────────────────
function AccountModal({db,onClose}){
  const EMPTY={id:"",pw:"",role:"staff",name:""};
  const [accs,setAccs]=useState([
    {id:"admin",pw:"",role:"admin",name:"관리자"},
    {id:"",pw:"",role:"staff",name:""},
    {id:"",pw:"",role:"staff",name:""},
    {id:"",pw:"",role:"staff",name:""},
    {id:"",pw:"",role:"staff",name:""},
    {id:"",pw:"",role:"staff",name:""},
  ]);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");

  useEffect(()=>{
    if(!db) return;
    db.collection("settings").doc("auth").get().then(doc=>{
      if(doc.exists&&doc.data().accounts){
        const saved=doc.data().accounts;
        const admin=saved.find(a=>a.role==="admin")||{id:"admin",pw:"",role:"admin",name:"관리자"};
        const staffs=saved.filter(a=>a.role==="staff");
        setAccs([admin,...Array.from({length:5},(_,i)=>staffs[i]||{id:"",pw:"",role:"staff",name:""})]);
      }
    }).catch(()=>{});
  },[db]);

  function upd(i,f,v){setAccs(prev=>prev.map((a,idx)=>idx===i?{...a,[f]:v}:a));}

  async function save(){
    const active=accs.filter(a=>a.id.trim()&&a.pw.trim());
    if(!active.find(a=>a.role==="admin")){setMsg("관리자 계정은 필수입니다.");return;}
    for(const a of active){
      if(a.id.length<2){setMsg(`아이디 2자 이상: ${a.name||a.id}`);return;}
      if(a.pw.length<4){setMsg(`비밀번호 4자리 이상: ${a.name||a.id}`);return;}
    }
    const ids=active.map(a=>a.id);
    if(new Set(ids).size!==ids.length){setMsg("아이디 중복");return;}
    setBusy(true);
    try{
      if(db) await db.collection("settings").doc("auth").set({accounts:active.map(a=>({id:a.id.trim(),pw:a.pw,role:a.role,name:a.name||a.id}))});
      setMsg("✅ 저장 완료!");setTimeout(onClose,1000);
    }catch(e){setMsg("오류: "+e.message);}
    setBusy(false);
  }

  const iS={padding:"8px 10px",border:"1px solid #e2e8f0",borderRadius:7,fontSize:12,width:"100%",fontFamily:"'Noto Sans KR',sans-serif"};

  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2}}>🔐 계정 관리</span>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#94a3b8"}}>✕</button>
        </div>
        <div className="modal-body">
          <div style={{background:"#f8fafc",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:11,color:"#64748b",lineHeight:1.8}}>
            <div>👑 관리자(1명): 전체 기능</div>
            <div>👤 직원(최대 5명): 캘린더·고객만 (금액·분석 비공개)</div>
          </div>
          {accs.map((a,i)=>(
            <div key={i} style={{background:a.role==="admin"?"#fffbeb":"#f8fafc",borderRadius:10,
              padding:12,marginBottom:8,border:`1px solid ${a.role==="admin"?"#fcd34d":"#e2e8f0"}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:6,
                  background:a.role==="admin"?"#fef3c7":"#e0f2fe",color:a.role==="admin"?"#d97706":"#0284c7"}}>
                  {a.role==="admin"?"👑 관리자":`👤 직원 ${i}`}
                </span>
                <input style={{...iS,maxWidth:120}} placeholder="이름" value={a.name} onChange={e=>upd(i,"name",e.target.value)}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div>
                  <div style={{fontSize:10,color:"#64748b",marginBottom:3}}>아이디</div>
                  <input style={iS} placeholder={a.role==="admin"?"admin":"예: staff1"} value={a.id} onChange={e=>upd(i,"id",e.target.value)}/>
                </div>
                <div>
                  <div style={{fontSize:10,color:"#64748b",marginBottom:3}}>비밀번호</div>
                  <input style={iS} type="password" placeholder="4자리 이상" value={a.pw} onChange={e=>upd(i,"pw",e.target.value)}/>
                </div>
              </div>
            </div>
          ))}
          {msg&&<div style={{fontSize:12,padding:8,borderRadius:8,marginBottom:12,textAlign:"center",
            background:msg.startsWith("✅")?"#f0fdf4":"#fef2f2",
            color:msg.startsWith("✅")?"#16a34a":"#dc2626"}}>{msg}</div>}
          <div style={{display:"flex",gap:8}}>
            <button className="btn-secondary" style={{flex:1}} onClick={onClose}>취소</button>
            <button className="btn-primary" style={{flex:2}} onClick={save} disabled={busy}>{busy?"저장중...":"💾 저장"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function BookingModal({modal,customers,isAdmin,onSave,onSaveCust,onDelete,onClose}){
  const ex=modal.record;
  const [date,setDate]=useState(ex?.date||modal.date||today());
  const [slot,setSlot]=useState(ex?.slot||modal.slot||"10:00");
  const [custId,setCustId]=useState(String(ex?.customerId||""));
  const [services,setServices]=useState(ex?.services||[]);
  const [amount,setAmount]=useState(String(ex?.amount||""));
  const [payment,setPayment]=useState(ex?.payment||"카드");
  const [memo,setMemo]=useState(ex?.memo||"");
  const [multiDay,setMultiDay]=useState(String(ex?.multiDay||1));
  const [btype,setBtype]=useState(ex?.bookingType||"기존");
  const [q,setQ]=useState("");
  const [svcQ,setSvcQ]=useState("");
  const [q4,setQ4]=useState("");
  const [newName,setNewName]=useState("");
  const [newPhone,setNewPhone]=useState("");
  const [newCar,setNewCar]=useState("");
  const [newCarList,setNewCarList]=useState([]);
  const [selCar,setSelCar]=useState(ex?.car||"");

  const cust=customers.find(c=>c.id===custId);
  const filtered=(q.length>=2||q4.length>=4)?customers.filter(c=>{
    const nameMatch=q.length>=2&&(c.name||"").includes(q);
    const phoneMatch=q4.length>=4&&(c.phone||"").replace(/\D/g,"").endsWith(q4);
    return nameMatch||phoneMatch;
  }).slice(0,8):[];

  function toggleSvc(s){setServices(prev=>prev.includes(s)?prev.filter(x=>x!==s):[...prev,s]);}

  async function handleSave(){
    let finalCustId=custId;
    if(!finalCustId){
      // 신규 고객 자동 등록
      if(!newName.trim()&&!q.trim()){alert("고객명을 입력해주세요.");return;}
      const name=(newName||q).trim();
      const phone=newPhone.trim();
      const newId=String(Date.now());
      await onSaveCust({id:newId,name,phone,bookingType:btype,
        cars:newCarList.length>0?newCarList:(newCar.trim()?[newCar.trim()]:[]),memo:""});
      finalCustId=newId;
    }
    if(!services.length){alert("작업내용을 선택해주세요.");return;}
    if(isAdmin&&!amount){alert("금액을 입력해주세요.");return;}
      // 차량: 선택한 차량 우선, 없으면 빈값
    const carVal=selCar||(newCarList?.[0]||"");
    await onSave({id:ex?.id,date,slot,customerId:finalCustId,services,

            <span className="label">👤 고객</span>

                {(q.length>=1||q4.length>=1)&&filtered.length===0&&(

                      <input className="inp" placeholder="차종 입력 (Enter/쉼표로 추가)" value={newCar}

          )}

          <div>
            <span className="label">🏷️ 구분</span>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {BOOKING_TYPES.map(t=>(
                <button key={t} onClick={()=>setBtype(t)}
                  style={{padding:"5px 12px",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer",
                    border:`1.5px solid ${btype===t?BT[t].color:"#e2e8f0"}`,
                    background:btype===t?BT[t].bg:"#fff",color:btype===t?BT[t].color:"#94a3b8"}}>{t}</button>
              ))}
            </div>
          </div>
          {/* 작업내용 */}

            <span className="label">🔧 작업내용</span>

                if((e.key==="Enter"||e.key===",")&&svcQ.trim()){

                  svcQ.split(",").map(s=>s.trim()).filter(Boolean)
                    .forEach(s=>{if(!services.includes(s)) setServices(prev=>[...prev,s]);});
                  setSvcQ("");
                }
              }}/>
            {svcQ.length>=1&&(
              <div style={{background:"#fff",border:"1px solid #e2e8f0",
                borderRadius:8,zIndex:20,boxShadow:"0 4px 12px rgba(0,0,0,0.1)",
                maxHeight:160,overflowY:"auto",marginTop:4}}>
                {SERVICES.filter(s=>s.includes(svcQ)&&!services.includes(s)).slice(0,10).map(s=>(
                  <div key={s} onClick={()=>{setServices(prev=>[...prev,s]);setSvcQ("");}}
                    style={{padding:"9px 14px",cursor:"pointer",fontSize:13,borderBottom:"1px solid #f8fafc"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"}
                    onMouseLeave={e=>e.currentTarget.style.background=""}>
                    {s}
                  </div>
                ))}
                {!SERVICES.includes(svcQ.trim())&&svcQ.trim()&&(
                  <div onClick={()=>{setServices(prev=>[...prev,svcQ.trim()]);setSvcQ("");}}
                    style={{padding:"9px 14px",cursor:"pointer",fontSize:13,color:"#3b82f6",fontWeight:700}}>
                    + "{svcQ.trim()}" 직접 추가
                  </div>
                )}
              </div>
            )}
            {services.length>0&&(
              <div style={{marginTop:6,display:"flex",flexWrap:"wrap",gap:4}}>
                {services.map(s=>(
                  <span key={s} style={{fontSize:11,background:"#1e293b",color:"#fff",
                    padding:"3px 8px",borderRadius:5,fontWeight:600,display:"flex",alignItems:"center",gap:3}}>
                    {s}<span onClick={()=>setServices(prev=>prev.filter(x=>x!==s))}
                      style={{cursor:"pointer",opacity:0.6,marginLeft:1}}>✕</span>
                  </span>
                ))}
              </div>
            )}

          </div>
          {/* 금액/결제 - 관리자만 */}
          {isAdmin&&(
            <>
              <div>
                <span className="label">💰 금액</span>
                <input className="inp" type="number" placeholder="예: 80000" value={amount} onChange={e=>setAmount(e.target.value)}/>
                {amount&&<div style={{fontSize:12,fontWeight:700,color:"#1e293b",marginTop:4}}>{fmtKRW(amount)}</div>}
              </div>
              <div>
                <span className="label">💳 결제</span>
                <div style={{display:"flex",gap:6}}>
                  {PAYMENTS.map(p=><button key={p} className={`chip ${payment===p?"active":""}`} onClick={()=>setPayment(p)}>{p}</button>)}
                </div>
              </div>
            </>
          )}
          {/* 메모 */}
          <div>
            <span className="label">📝 메모</span>
            <textarea className="inp" rows={2} placeholder="특이사항..." value={memo} onChange={e=>setMemo(e.target.value)} style={{resize:"vertical"}}/>
          </div>
          {/* 버튼 */}
          <div style={{display:"flex",gap:8}}>
            {ex&&<button className="btn-danger" onClick={()=>{if(confirm("삭제할까요?"))onDelete(ex.id);onClose();}}>삭제</button>}
            <button className="btn-primary" style={{flex:1}} onClick={handleSave}>저장</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── 고객 모달 ─────────────────────────────────────────────
function RecSvcInput({editRec,setEditRec}){
  const [q,setQ]=useState("");
  return(
    <div style={{position:"relative"}}>
      <input className="inp" style={{fontSize:12}} placeholder="작업내용 검색/입력 후 Enter"
        value={q} onChange={e=>setQ(e.target.value)}
        onKeyDown={e=>{
          if((e.key==="Enter"||e.key===",")&&q.trim()){
            e.preventDefault();
            q.split(",").map(s=>s.trim()).filter(Boolean).forEach(s=>{
              if(!(editRec.services||[]).includes(s))
                setEditRec(v=>({...v,services:[...(v.services||[]),s]}));
            });
            setQ("");
          }
        }}/>
      {q.length>=1&&(
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,
          boxShadow:"0 4px 12px rgba(0,0,0,0.1)",maxHeight:140,overflowY:"auto",marginTop:4}}>
          {SERVICES.filter(s=>s.includes(q)&&!(editRec.services||[]).includes(s)).slice(0,8).map(s=>(
            <div key={s} onClick={()=>{setEditRec(v=>({...v,services:[...(v.services||[]),s]}));setQ("");}}
              style={{padding:"8px 14px",cursor:"pointer",fontSize:13,borderBottom:"1px solid #f8fafc"}}
              onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"}
              onMouseLeave={e=>e.currentTarget.style.background=""}>
              {s}
            </div>
          ))}
          {!SERVICES.includes(q.trim())&&q.trim()&&(
            <div onClick={()=>{setEditRec(v=>({...v,services:[...(v.services||[]),q.trim()]}));setQ("");}}
              style={{padding:"8px 14px",cursor:"pointer",fontSize:13,color:"#3b82f6",fontWeight:700}}>
              + "{q.trim()}" 직접 추가
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function CustomerModal({customer,records,onSave,onSaveRec,onDelete,onClose}){
  const [tab,setTab]=useState("info"); // info | history | edit
  const [editRec,setEditRec]=useState(null); // 수정 중인 예약
  const [name,setName]=useState(customer?.name||"");
  const [phone,setPhone]=useState(customer?.phone||"");
  const [carList,setCarList]=useState(customer?.cars||[]);
  const [carInput,setCarInput]=useState("");
  const [btype,setBtype]=useState(customer?.bookingType||"신규");
  const [memo,setMemo]=useState(customer?.memo||"");

  const total=records.reduce((s,r)=>s+Number(r.amount||0),0);
  const sorted=[...records].sort((a,b)=>b.date.localeCompare(a.date));
  const last=sorted[0];
  const avg=records.length?Math.round(total/records.length):0;

  async function handleSave(){
    if(!name.trim()&&!phone.trim()){alert("이름 또는 전화번호를 입력해주세요.");return;}
    await onSave({id:customer?.id,name,phone,cars:carList,bookingType:btype,memo});
    onClose();
  }

  const btc=BT[btype]||BT["신규"];

  return(
    <div className="modal-bg" onClick={onClose}>

        {/* 헤더 */}

            <div>

              {customer?.name&&<div style={{fontSize:12,color:"#64748b",marginTop:2}}>{customer.phone}</div>}

            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
              {[
                {label:"총 방문",val:`${records.length}회`,color:"#1e40af"},
                {label:"누적 매출",val:records.length>0?`${Math.round(total/10000)}만원`:"0",color:"#065f46"},
                {label:"평균단가",val:records.length>0?`${Math.round(avg/10000)}만원`:"0",color:"#7c2d12"},
              ].map((s,i)=>(
                <div key={i} style={{background:"#f8fafc",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>

                  <div style={{fontSize:14,fontWeight:800,color:s.color}}>{s.val}</div>

              <button key={v} onClick={()=>setTab(v)}

                  borderBottom:tab===v?"2px solid #1e293b":"2px solid transparent",
                  marginBottom:-2}}>
                {l}
              </button>
            ))}
          </div>
        </div>

        {/* 탭 콘텐츠 */}
        <div style={{padding:"14px 16px 20px",maxHeight:"55vh",overflowY:"auto"}}>

          {/* ── 정보 탭 ── */}

// ── 미니 캘린더 (대시보드용) ─────────────────────────────
function MiniCalendar({year,month,selDate,calMap,onSelect}){
  const [MY,setMY]=useState(()=>({y:year,m:month}));
  useEffect(()=>{setMY({y:year,m:month});},[year,month]);
  const days=getDays(MY.y,MY.m);
  const DAYS=["일","월","화","수","목","금","토"];
  const ts=today();
  return(
    <div className="card" style={{padding:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <button onClick={()=>setMY(({y,m})=>m===0?{y:y-1,m:11}:{y,m:m-1})}
          style={{background:"none",border:"1px solid #e2e8f0",borderRadius:5,width:24,height:24,cursor:"pointer",fontSize:12}}>‹</button>
        <span style={{fontSize:12,fontWeight:700,color:"#1e293b"}}>{MY.y}.{String(MY.m+1).padStart(2,"0")}</span>
        <button onClick={()=>setMY(({y,m})=>m===11?{y:y+1,m:0}:{y,m:m+1})}
          style={{background:"none",border:"1px solid #e2e8f0",borderRadius:5,width:24,height:24,cursor:"pointer",fontSize:12}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,marginBottom:2}}>
        {DAYS.map((d,i)=><div key={d} style={{textAlign:"center",fontSize:9,fontWeight:700,padding:"2px 0",color:i===0?"#ef4444":i===6?"#3b82f6":"#94a3b8"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {days.map((d,i)=>{
          if(!d) return <div key={i}/>;
          const ds=`${MY.y}-${String(MY.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const isSel=ds===selDate, isT=ds===ts;
          const hasRec=(calMap[ds]?.allDay?.length||0)+(calMap[ds]?.time?.length||0)>0;
          const dow=new Date(ds).getDay();
          return(
            <div key={i} onClick={()=>onSelect(ds)}
              style={{textAlign:"center",padding:"5px 1px",borderRadius:5,cursor:"pointer",
                background:isSel?"#1e293b":isT?"#fffbeb":"transparent",
                color:isSel?"#fff":isT?"#d97706":dow===0?"#ef4444":dow===6?"#3b82f6":"#334155",
                fontSize:11,fontWeight:isSel||isT?700:400,position:"relative"}}>
              {d}
              {hasRec&&!isSel&&<span style={{position:"absolute",bottom:1,left:"50%",transform:"translateX(-50%)",width:3,height:3,borderRadius:"50%",background:isT?"#f59e0b":"#3b82f6",display:"block"}}/>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── 캘린더 컴포넌트 ──────────────────────────────────────
function BigCalendar({year,month,calMap,isWeek,selDate,onCellClick,weekBase,half}){
  const [isPC,setIsPC]=useState(window.innerWidth>=768);
  const [winH,setWinH]=useState(window.innerHeight);
  useEffect(()=>{
    const fn=()=>{setIsPC(window.innerWidth>=768);setWinH(window.innerHeight);};
    window.addEventListener("resize",fn);
    return()=>window.removeEventListener("resize",fn);
  },[]);

  const days=isWeek?getWeekDates(weekBase||selDate):
    half==="first"?getHalfDays(year,month,"first"):
    half==="second"?getHalfDays(year,month,"second"):
    getDays(year,month);
  const weekCount=isWeek?1:Math.ceil(days.length/7);
  const OFFSET=200;
  const cellH=isPC?(isWeek?Math.max(160,Math.floor((winH-OFFSET)*0.88)):Math.max(120,Math.floor((winH-OFFSET)/weekCount))):isWeek?110:90;

  function getDs(d){
    if(!d) return null;
    if(isWeek) return d;
    return `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  }

  const DAYS_HEADER=["SUN","MON","TUE","WED","THU","FRI","SAT"];

  return(
    <div className={isPC?"":"cal-wrap"} style={{overflowX:isPC?"hidden":"auto",touchAction:isPC?"auto":"pan-x"}}>
      <div style={{width:isPC?"100%":"calc(100px * 7 + 6px)",minWidth:isPC?"100%":"700px"}}>
        {/* 요일 헤더 */}
        <div style={{display:"grid",gridTemplateColumns:isPC?"repeat(7,1fr)":"repeat(7,100px)",gap:1,background:"#e2e8f0",borderRadius:"10px 10px 0 0",overflow:"hidden"}}>
          {DAYS_HEADER.map((d,i)=>(
            <div key={d} className="cal-head" style={{color:i===0?"#ef4444":i===6?"#3b82f6":"#64748b"}}>{d}</div>
          ))}
        </div>
        {/* 날짜 그리드 */}
        <div style={{display:"grid",gridTemplateColumns:isPC?"repeat(7,1fr)":"repeat(7,100px)",gap:1,background:"#e2e8f0",borderRadius:"0 0 10px 10px",overflow:"hidden"}}>
          {days.map((d,i)=>{
            const ds=getDs(d);
            if(!d) return <div key={i} style={{background:"#f8fafc",minHeight:cellH}}/>;
            const isToday=ds===today();
            const isSel=ds===selDate;
            const dow=new Date(ds).getDay();
            const data=calMap[ds]||{allDay:[],time:[]};
            const dispDay=isWeek?Number(ds.slice(8)):d;
            return(
              <div key={i} onClick={()=>onCellClick(ds)}
                style={{background:isSel?"#1e293b":isToday?"#fffbeb":"#fff",
                  minHeight:cellH,padding:"5px 4px",cursor:"pointer",
                  borderTop:isSel?"2px solid #1e293b":isToday?"2px solid #f59e0b":"2px solid transparent",
                  overflow:"hidden"}}>
                <div style={{fontSize:isPC?13:11,fontWeight:700,fontFamily:"'Bebas Neue',sans-serif",
                  color:isSel?"#fff":isToday?"#d97706":dow===0?"#ef4444":dow===6?"#3b82f6":"#334155",
                  marginBottom:3}}>{dispDay}</div>
                {data.allDay.map((r,j)=>(
                  <div key={j} className="slot-all"
                    style={{fontSize:9,fontWeight:700,padding:"2px 4px",marginBottom:1,
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                      borderRadius:r._isFirst?"3px 0 0 3px":r._isLast?"0 3px 3px 0":"0",
                      borderRight:!r._isLast?"none":undefined}}>
                    {r._isFirst?"◀ ":""}{r._custName||""}{r._isLast?" ▶":""}
                  </div>
                ))}
                {data.time.map((r,j)=>(
                  <div key={j} className={amtClass(r._amount,r._bookingType)}
                    style={{fontSize:9,fontWeight:700,padding:"2px 4px",borderRadius:3,marginBottom:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {r.slot} {r._custName||""}
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── 분석 탭 컴포넌트 ────────────────────────────────────
function AnalyticsTab({records}){
  const [aView,setAView]=useState("monthly");
  const now=new Date();
  const [aYear,setAYear]=useState(now.getFullYear());

  const monthlyData=Array.from({length:12},(_,mi)=>{
    const prefix=`${aYear}-${String(mi+1).padStart(2,"0")}`;
    const recs=records.filter(r=>r.date.startsWith(prefix));
    return{month:mi+1,total:recs.reduce((s,r)=>s+Number(r.amount||0),0),count:recs.length};
  });
  const maxMonthly=Math.max(...monthlyData.map(d=>d.total),1);

  const fmtM=n=>n>0?`${Math.round(n/10000)}만`:"-";
  const fmtV=n=>n>0?String(n):"-";

  const allYears=[2019,2020,2021,2022,2023,2024,2025,2026];
  const yearRows=allYears.map(y=>{
    const excelMonths=EXCEL_SALES[y]||Array(12).fill(0);
    const dbMonths=Array.from({length:12},(_,mi)=>{
      const prefix=`${y}-${String(mi+1).padStart(2,"0")}`;
      return records.filter(r=>r.date.startsWith(prefix)).reduce((s,r)=>s+Number(r.amount||0),0);
    });
    const months=excelMonths.map((e,i)=>e+dbMonths[i]);
    const total=months.reduce((s,v)=>s+v,0);
    return{year:y,months,total};
  }).filter(r=>r.total>0);
  const grandTotal=yearRows.reduce((s,r)=>s+r.total,0);

  function getStats(y){
    const es=EXCEL_STATS[y]||{visits:Array(12).fill(0),works:Array(12).fill(0),normal:Array(12).fill(0),gmenic:Array(12).fill(0),naver:Array(12).fill(0),avg:Array(12).fill(0)};
    const dbV=Array.from({length:12},(_,mi)=>{const p=`${y}-${String(mi+1).padStart(2,"0")}`;return records.filter(r=>r.date.startsWith(p)).length;});
    const dbN=Array.from({length:12},(_,mi)=>{const p=`${y}-${String(mi+1).padStart(2,"0")}`;return records.filter(r=>r.date.startsWith(p)&&r.bookingType==="네이버").length;});
    const dbG=Array.from({length:12},(_,mi)=>{const p=`${y}-${String(mi+1).padStart(2,"0")}`;return records.filter(r=>r.date.startsWith(p)&&r.bookingType==="지메닉").length;});
    const visits=es.visits.map((e,i)=>e+dbV[i]);
    const naver=es.naver.map((e,i)=>e+dbN[i]);
    const gmenic=es.gmenic.map((e,i)=>e+dbG[i]);
    const yr_total=visits.reduce((s,v)=>s+v,0);
    return{visits,works:es.works,normal:es.normal,gmenic,naver,avg:es.avg};
  }

  return(
    <div className="fade-in">
      <div style={{display:"flex",background:"#fff",borderRadius:10,padding:3,marginBottom:14,border:"1px solid #e2e8f0",width:"fit-content"}}>
        {[["monthly","월별 분석"],["yearly","연도별 분석"]].map(([v,l])=>(
          <button key={v} onClick={()=>setAView(v)}
            style={{padding:"7px 18px",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",
              background:aView===v?"#1e293b":"transparent",color:aView===v?"#fff":"#94a3b8"}}>{l}</button>
        ))}
      </div>

      {aView==="monthly"&&(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <button onClick={()=>setAYear(y=>y-1)} style={{width:28,height:28,border:"1px solid #e2e8f0",borderRadius:6,background:"#fff",cursor:"pointer"}}>‹</button>
            <span style={{fontWeight:800,fontSize:15}}>{aYear}년</span>

// ── 매출현황 슬라이드 패널 ───────────────────────────────
function SalesPanel({records,selDate,onClose}){
  const [mode,setMode]=useState("day"); // day|week|month
  const [ref_d,setRefD]=useState(selDate||new Date().toISOString().slice(0,10));
  const todayStr=new Date().toISOString().slice(0,10);

  function getRecs(label){
    if(label==="day") return records.filter(r=>r.date===ref_d);
    if(label==="week"){
      const wk=getWeekDates(ref_d);
      return records.filter(r=>wk.includes(r.date));
    }
    const prefix=ref_d.slice(0,7);
    return records.filter(r=>r.date.startsWith(prefix));
  }

  const recs=getRecs(mode);
  const total=recs.reduce((s,r)=>s+Number(r.amount||0),0);
  const byPayment={};
  recs.forEach(r=>{byPayment[r.payment||"기타"]=(byPayment[r.payment||"기타"]||0)+Number(r.amount||0);});

  const label=mode==="day"?ref_d.slice(5).replace("-","."):
    mode==="week"?`${getWeekDates(ref_d)[0].slice(5).replace("-",".")}~${getWeekDates(ref_d)[6].slice(5).replace("-",".")}`:
    ref_d.slice(0,7).replace("-",".");

  function prev(){
    if(mode==="day") setRefD(d=>addDays(d,-1));
    else if(mode==="week") setRefD(d=>addDays(d,-7));
    else{ const dt=new Date(ref_d); dt.setMonth(dt.getMonth()-1); setRefD(dt.toISOString().slice(0,10)); }
  }
  function next(){
    if(mode==="day") setRefD(d=>addDays(d,1));
    else if(mode==="week") setRefD(d=>addDays(d,7));
    else{ const dt=new Date(ref_d); dt.setMonth(dt.getMonth()+1); setRefD(dt.toISOString().slice(0,10)); }
  }

  return(
    <div style={{position:"fixed",inset:0,zIndex:150,display:"flex",alignItems:"stretch",justifyContent:"flex-end"}} onClick={onClose}>
      <div style={{width:280,background:"#fff",boxShadow:"-8px 0 32px rgba(0,0,0,0.15)",
        display:"flex",flexDirection:"column",animation:"slideInRight 0.25s ease",padding:20,overflowY:"auto"}}
        onClick={e=>e.stopPropagation()}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:3,color:"#1e293b",marginBottom:16}}>💰 매출 현황</div>
        {/* 기간 선택 */}
        <div style={{display:"flex",gap:4,marginBottom:14}}>
          {[["day","일"],["week","주"],["month","월"]].map(([v,l])=>(
            <button key={v} onClick={()=>setMode(v)}
              style={{flex:1,padding:"6px 0",border:"none",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",
                background:mode===v?"#1e293b":"#f1f5f9",color:mode===v?"#fff":"#64748b"}}>{l}</button>
          ))}
        </div>
        {/* 네비 */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
          <button onClick={prev} style={{background:"none",border:"1px solid #e2e8f0",borderRadius:6,width:28,height:28,cursor:"pointer"}}>‹</button>
          <span style={{flex:1,textAlign:"center",fontSize:12,fontWeight:700,color:"#1e293b"}}>{label}</span>
          <button onClick={next} style={{background:"none",border:"1px solid #e2e8f0",borderRadius:6,width:28,height:28,cursor:"pointer"}}>›</button>
        </div>
        {/* 합계 */}
        <div style={{background:"#0f172a",borderRadius:12,padding:"16px",marginBottom:14,textAlign:"center"}}>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginBottom:6}}>총 매출</div>
          <div style={{fontSize:26,fontWeight:800,color:"#fff",letterSpacing:-1}}>{fmtKRW(total)}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:4}}>{recs.length}건</div>
        </div>
        {/* 결제수단별 */}
        {Object.entries(byPayment).map(([p,amt])=>(
          <div key={p} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f1f5f9",fontSize:13}}>
            <span style={{color:"#64748b",fontWeight:600}}>{p}</span>
            <span style={{fontWeight:700,color:"#1e293b"}}>{fmtKRW(amt)}</span>
          </div>
        ))}
        {/* 건별 목록 */}
        <div style={{marginTop:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:8}}>건별 내역</div>
          {recs.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>(
            <div key={r.id} style={{padding:"8px 0",borderBottom:"1px solid #f1f5f9",fontSize:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                <span style={{color:"#64748b"}}>{r.date.slice(5).replace("-",".")} {r.slot}</span>
                <span style={{fontWeight:700,color:"#1e293b"}}>{fmtKRW(r.amount)}</span>
              </div>
              <div style={{color:"#94a3b8",fontSize:11}}>{(r.services||[]).join(" · ")}</div>
            </div>
          ))}
          {recs.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"#cbd5e1",fontSize:12}}>내역 없음</div>}
        </div>
        <button onClick={onClose} style={{marginTop:"auto",paddingTop:16,background:"none",border:"none",color:"#94a3b8",fontSize:12,cursor:"pointer"}}>닫기</button>
      </div>
    </div>
  );
}

// ── 메인 App ─────────────────────────────────────────────
function App(){

  const {customers,records,loading,connected,saveCustomer,deleteCustomer,saveRecord,deleteRecord}=useData(db);

  // ── 모든 useState/useRef/useEffect/useMemo는 여기에 선언 ──
  const [isMobile,setIsMobile]=useState(window.innerWidth<768);
  useEffect(()=>{
    const fn=()=>setIsMobile(window.innerWidth<768);
    window.addEventListener("resize",fn);
    return()=>window.removeEventListener("resize",fn);
  },[]);
  const [role,setRole]=useState(()=>{
    try{const s=localStorage.getItem(AUTH_KEY);if(s){const p=JSON.parse(s);if(p.role&&p.id)return p.role;}}catch(e){}
    return null;
  });
  const [loginName,setLoginName]=useState(()=>{
    try{const s=localStorage.getItem(AUTH_KEY);if(s){const p=JSON.parse(s);return p.name||"";}}catch(e){}
    return "";
  });
  const [tab,setTab]=useState("dashboard");
  const [sideOpen,setSideOpen]=useState(false);
  const [selDate,setSelDate]=useState(today());
  const [calY,setCalY]=useState(new Date().getFullYear());
  const [calM,setCalM]=useState(new Date().getMonth());
  const [view,setView]=useState("month");
  const [bookingModal,setBookingModal]=useState(null);
  const [custModal,setCustModal]=useState(null);
  const [showAccModal,setShowAccModal]=useState(false);
  const [dayPopup,setDayPopup]=useState(null);
  const [custQ,setCustQ]=useState("");
  const [showSales,setShowSales]=useState(false);
  const [dashDate,setDashDate]=useState(today());
  const [exitToast,setExitToast]=useState(false);
  const exitTimer=useRef(null);
  const stateRef=useRef({});
  const closeSide=useCallback(()=>setSideOpen(false),[]);

  // useMemo는 항상 최상단에
  const calMap=useMemo(()=>{
    const map={};
    const ensure=d=>{if(!map[d])map[d]={allDay:[],time:[]};};
    records.forEach(r=>{
      const cust=customers.find(c=>c.id===r.customerId||c.id===String(r.customerId));
      const name=cust?.name||cust?.phone||"";
      if(r.slot==="종일"){
        const days=spanDates(r.date,Number(r.multiDay||1));
        days.forEach((d,idx)=>{
          ensure(d);
          map[d].allDay.push({...r,_custName:name,_spanIdx:idx,_spanTotal:days.length,
            _isFirst:idx===0,_isLast:idx===days.length-1,_amount:r.amount,_bookingType:r.bookingType});
        });
      } else {
        ensure(r.date);
        map[r.date].time.push({...r,_custName:name,_amount:Number(r.amount||0),_bookingType:r.bookingType||''});
      }
    });
    return map;
  },[records,customers]);

  const isAdmin=role==="admin";

  const sortedCustomers=useMemo(()=>{
    const base=custQ.length>=2?customers.filter(c=>{
      const q=custQ.trim();
      const qd=q.replace(/[^0-9]/g,"");
      return (c.name||"").includes(q)||(qd.length>=2&&(c.phone||"").replace(/[^0-9]/g,"").includes(qd));
    }):customers;
    return [...base].sort((a,b)=>{
      const la=records.filter(r=>r.customerId===a.id||r.customerId===String(a.id)).sort((x,y)=>y.date.localeCompare(x.date))[0]?.date||"";
      const lb=records.filter(r=>r.customerId===b.id||r.customerId===String(b.id)).sort((x,y)=>y.date.localeCompare(x.date))[0]?.date||"";
      return lb.localeCompare(la);
    });
  },[customers,records,custQ]);

  // 뒤로가기
  useEffect(()=>{
    stateRef.current={tab,sideOpen,bookingModal,custModal,showAccModal,dayPopup};
  });
  useEffect(()=>{
    window.history.pushState({g:1},"","");
    window.history.pushState({g:2},"","");
    const fn=()=>{
      const s=stateRef.current;
      if(s.dayPopup){setDayPopup(null);window.history.pushState({g:2},"","");return;}
      if(s.bookingModal){setBookingModal(null);window.history.pushState({g:2},"","");return;}
      if(s.custModal){setCustModal(null);window.history.pushState({g:2},"","");return;}
      if(s.showAccModal){setShowAccModal(false);window.history.pushState({g:2},"","");return;}
      if(s.sideOpen){setSideOpen(false);window.history.pushState({g:2},"","");return;}
      if(s.tab!=="dashboard"){setTab("dashboard");window.history.pushState({g:2},"","");return;}
      window.history.pushState({g:2},"","");
      setExitToast(true);
      if(exitTimer.current) clearTimeout(exitTimer.current);
      exitTimer.current=setTimeout(()=>setExitToast(false),2500);
    };
    window.addEventListener("popstate",fn);
    return()=>window.removeEventListener("popstate",fn);
  },[]);

  // ── 여기서 조건부 렌더링 (Hook 이후) ─────────────────────
  if(loading) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16,background:"#0f172a"}}>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,letterSpacing:4,color:"#fff"}}>G-MENIC</div>
      <div style={{width:60,height:2,background:"rgba(255,255,255,0.2)",borderRadius:1}}/>
      <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:2}}>{db?"CONNECTING...":"LOADING..."}</div>
    </div>
  );

  if(!role) return <LoginScreen db={db} onLogin={(r,n)=>{setRole(r);setLoginName(n);}}/>;

  // ── 헬퍼 함수들 ──────────────────────────────────────────
  function handleLogout(){localStorage.removeItem(AUTH_KEY);setRole(null);setLoginName("");}
  function openBooking(date,slot,record=null){setBookingModal({date,slot,record});}
  function openDayDetail(ds){setSelDate(ds);}

  // ── 메뉴 목록 ──────────────────────────────────────────
  const MENUS=[
    {id:"dashboard",icon:"📊",label:"DASHBOARD"},
    {id:"calendar",icon:"📅",label:"캘린더"},
    {id:"customers",icon:"👥",label:"고객"},
    ...(isAdmin?[{id:"analytics",icon:"📈",label:"분석"}]:[]),
  ];

  // ── 오늘 예약 ──────────────────────────────────────────
  const todayRecs=records.filter(r=>r.date===dashDate).sort((a,b)=>a.slot.localeCompare(b.slot));
  const selRecs=records.filter(r=>r.date===selDate).sort((a,b)=>a.slot.localeCompare(b.slot));
  const getC=id=>customers.find(c=>c.id===id||c.id===String(id));

  // ── 분석 데이터 ──────────────────────────────────────────
  const thisM=new Date().getMonth();
  const thisY=new Date().getFullYear();
  const monthTotal=records.filter(r=>r.date.startsWith(`${thisY}-${String(thisM+1).padStart(2,"0")}`)).reduce((s,r)=>s+Number(r.amount||0),0);
  const todayTotal=todayRecs.reduce((s,r)=>s+Number(r.amount||0),0);
  const todayCash=todayRecs.filter(r=>r.payment==="현금").reduce((s,r)=>s+Number(r.amount||0),0);
  const todayCard=todayRecs.filter(r=>r.payment==="카드").reduce((s,r)=>s+Number(r.amount||0),0);
  const thisYM=`${thisY}-${String(thisM+1).padStart(2,"0")}`;
  const monthVisitors=records.filter(r=>r.date.startsWith(thisYM)).length;
  const isToday=dashDate===today();

  return(
    <div className="layout">
      {/* 오버레이 */}
      <div className={`overlay ${sideOpen?"show":""}`} onClick={()=>setSideOpen(false)}/>

          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:3,color:"#fff"}}>G-MENIC</div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:2,letterSpacing:1}}>CAR CARE CRM · 해운대</div>

              <span style={{width:6,height:6,borderRadius:"50%",background:connected?"#4ade80":"#f87171",display:"inline-block"}}/>

            </div>

              {isAdmin?"👑":"👤"} {loginName||"사용자"}
            </span>
          </div>
        </div>
        <nav className="sb-nav">
          <div style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.25)",letterSpacing:2,padding:"8px 10px 4px"}}>메뉴</div>
          {MENUS.map(m=>(
            <button key={m.id} className={`sb-item ${tab===m.id?"active":""}`}
              onClick={()=>{setTab(m.id);setSideOpen(false);}}>
              <span className="sb-item-icon">{m.icon}</span>{m.label}
            </button>
          ))}
          <div style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.25)",letterSpacing:2,padding:"12px 10px 4px"}}>빠른 메뉴</div>
          <button className="sb-item" onClick={()=>{setBookingModal({date:today(),slot:"10:00",record:null});setSideOpen(false);}}>
            <span className="sb-item-icon">➕</span>예약 등록
          </button>
          <button className="sb-item" onClick={()=>{setCustModal("new");setSideOpen(false);}}>
            <span className="sb-item-icon">👤</span>신규 고객
          </button>
          {isAdmin&&(
            <>
              <button className="sb-item" onClick={()=>{setShowSales(true);setSideOpen(false);}}>
                <span className="sb-item-icon">💰</span>매출 현황
              </button>
              <button className="sb-item" onClick={()=>{setShowAccModal(true);setSideOpen(false);}}>
                <span className="sb-item-icon">🔐</span>계정 관리
              </button>
            </>
          )}
          <button className="sb-item" onClick={()=>{handleLogout();setSideOpen(false);}}>
            <span className="sb-item-icon">🚪</span>로그아웃
          </button>
        </nav>
        <div className="sb-footer">{today().replace(/-/g,".")} {WD(today())}</div>
      </aside>

      {/* 메인 */}
      <div className="main">
        {/* 탑바 */}
        <div className="topbar">
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button className="mob-menu-btn" onClick={()=>setSideOpen(v=>!v)}
              style={{background:"none",border:"none",fontSize:20,cursor:"pointer",width:36,height:36}}>☰</button>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:2,color:"#1e293b"}}>
              {tab==="dashboard"?"DASHBOARD":MENUS.find(m=>m.id===tab)?.label||"G-MENIC"}
            </div>
          </div>
          <div style={{fontSize:12,color:"#94a3b8"}}>{today().replace(/-/g,".")} {WD(today())}</div>
        </div>

        {/* 콘텐츠 */}
        <div className="content">

          {/* ── 대시보드 ─────────────────────────────────── */}
          {tab==="dashboard"&&(
            <div className="fade-in">
              {/* 날짜 네비게이션 */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:14}}>
                <button onClick={()=>setDashDate(d=>addDays(d,-1))}
                  style={{width:32,height:32,border:"1px solid #e2e8f0",borderRadius:8,background:"#fff",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:18,fontWeight:800,color:"#1e293b",letterSpacing:-0.5}}>
                    {dashDate.replace(/-/g,".")}
                  </div>
                  <div style={{fontSize:11,color:"#94a3b8",marginTop:1}}>
                    {WD(dashDate)}요일{isToday?" · 오늘":""}
                  </div>
                </div>
                <button onClick={()=>setDashDate(d=>addDays(d,1))}
                  style={{width:32,height:32,border:"1px solid #e2e8f0",borderRadius:8,background:"#fff",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
                {!isToday&&<button onClick={()=>setDashDate(today())}
                  style={{padding:"4px 10px",background:"#1e293b",color:"#fff",border:"none",borderRadius:6,fontSize:10,fontWeight:700,cursor:"pointer"}}>오늘</button>}
              </div>
              <div className="stat-grid">
                {[
                  {label:`${isToday?"오늘":"선택일"} 예약`,val:`${todayRecs.length}건`,bg:"linear-gradient(135deg,#1e40af,#3b82f6)"},
                  ...(isAdmin?[
                    {label:`${isToday?"오늘":"선택일"} 매출`,val:fmtKRW(todayTotal),bg:"linear-gradient(135deg,#065f46,#10b981)",click:()=>setShowSales(true)},
                    {label:"이달 매출",val:fmtKRW(monthTotal),bg:"linear-gradient(135deg,#7c2d12,#ea580c)",click:()=>setShowSales(true)},
                    {label:"현금 매출",val:fmtKRW(todayCash),bg:"linear-gradient(135deg,#064e3b,#059669)"},
                    {label:"카드 매출",val:fmtKRW(todayCard),bg:"linear-gradient(135deg,#1e3a5f,#2563eb)"},
                    {label:"이달 입고",val:`${monthVisitors}건`,bg:"linear-gradient(135deg,#4c1d95,#7c3aed)"},
                  ]:[]),
                  ...(!isAdmin?[{label:"전체 고객",val:`${customers.length}명`,bg:"linear-gradient(135deg,#4c1d95,#7c3aed)"}]:[]),
                ].map((s,i)=>(
                  <div key={i} className="stat-card" style={{background:s.bg,cursor:s.click?"pointer":"default"}}
                    onClick={s.click}>
                    <div style={{fontSize:11,opacity:0.8,marginBottom:6}}>{s.label}</div>
                    <div style={{fontSize:20,fontWeight:800}}>{s.val}</div>
                  </div>
                ))}
              </div>
              {/* 오늘 예약 목록 */}
              <div className="card">
                <div style={{fontWeight:800,fontSize:14,marginBottom:12}}>📅 {dashDate.replace(/-/g,".")} {WD(dashDate)}요일 예약</div>
                {todayRecs.length===0?(
                  <div style={{textAlign:"center",padding:"24px 0",color:"#cbd5e1",fontSize:13}}>예약이 없습니다</div>
                ):todayRecs.map(r=>{
                  const c=getC(r.customerId);
                  return(
                    <div key={r.id} onClick={()=>setBookingModal({date:r.date,slot:r.slot,record:r})}
                      style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",
                        borderBottom:"1px solid #f1f5f9",cursor:"pointer"}}>
                      <span className={`${SLOT_STYLE[r.slot]||"slot-10"}`}
                        style={{padding:"4px 8px",borderRadius:6,fontSize:11,fontWeight:700,flexShrink:0}}>{r.slot}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:13}}>{c?.name||c?.phone||"고객"}</div>
                        <div style={{fontSize:11,color:"#94a3b8"}}>{(r.services||[]).join(" · ")}</div>
                      </div>
                      {isAdmin&&(()=>{const ac=amtColor(r.amount,r.bookingType);return(
                        <div style={{fontSize:12,fontWeight:700,flexShrink:0,padding:"2px 8px",
                          borderRadius:6,background:ac.bg,color:ac.color,border:`1px solid ${ac.border}`}}>
                          {fmtKRW(r.amount)}</div>
                      );})()}
                    </div>
                  );
                })}
              </div>
              {/* 미니 캘린더 */}
              <MiniCalendar
                year={new Date(dashDate).getFullYear()}
                month={new Date(dashDate).getMonth()}
                selDate={dashDate}
                calMap={calMap}
                onSelect={d=>{setDashDate(d);}}/>
            </div>
          )}

          {tab==="calendar"&&(

              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,gap:8,flexWrap:"wrap"}}>
                <div style={{display:"flex",background:"#fff",borderRadius:8,padding:2,gap:1,border:"1px solid #e2e8f0"}}>
                  {[["month","월"],["first","전반"],["second","후반"],["week","주"]].map(([v,l])=>(
                    <button key={v} onClick={()=>setView(v)}
                      style={{padding:"5px 12px",border:"none",fontSize:11,fontWeight:700,cursor:"pointer",borderRadius:6,
                        background:view===v?"#1e293b":"none",color:view===v?"#fff":"#94a3b8"}}>{l}</button>

                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <button onClick={()=>{

                    if(view==="first"){if(calM===0){setCalY(y=>y-1);setCalM(11);}else setCalM(m=>m-1);setView("second");return;}
                    if(view==="second"){setView("first");return;}
                    if(calM===0){setCalY(y=>y-1);setCalM(11);}else setCalM(m=>m-1);
                  }} style={{background:"none",border:"1px solid #e2e8f0",borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:14}}>‹</button>
                  <span style={{fontSize:14,fontWeight:700,color:"#1e293b",minWidth:80,textAlign:"center"}}>
                    {view==="week"?selDate.slice(0,7).replace("-","."):
                      view==="first"?`${calY}.${String(calM+1).padStart(2,"0")} 전반`:
                      view==="second"?`${calY}.${String(calM+1).padStart(2,"0")} 후반`:
                      `${calY}.${String(calM+1).padStart(2,"0")}`}
                  </span>
                  <button onClick={()=>{
                    if(view==="week"){setSelDate(d=>addDays(d,7));return;}
                    if(view==="first"){setView("second");return;}
                    if(view==="second"){if(calM===11){setCalY(y=>y+1);setCalM(0);}else setCalM(m=>m+1);setView("first");return;}
                    if(calM===11){setCalY(y=>y+1);setCalM(0);}else setCalM(m=>m+1);
                  }} style={{background:"none",border:"1px solid #e2e8f0",borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:14}}>›</button>
                  <button onClick={()=>{setSelDate(today());setCalY(new Date().getFullYear());setCalM(new Date().getMonth());}}
                    style={{padding:"4px 10px",background:"#1e293b",color:"#fff",border:"none",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>오늘</button>
                </div>
                <button onClick={()=>openBooking(selDate,"10:00")}
                  style={{padding:"7px 14px",background:"#1e293b",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>+ 예약</button>
              </div>

              {/* 범례 */}
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                {[["~13만","amt-low"],["~20만","amt-mid"],["~50만","amt-high"],["51만+","amt-top"],["지메닉","amt-gmenic"]].map(([s,cls])=>(
                  <span key={s} className={cls} style={{fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:5}}>{s}</span>
                ))}
                <span onClick={()=>openBooking(selDate,"10:00")}
                  style={{fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:5,
                    background:"#f1f5f9",border:"1px solid #e2e8f0",color:"#64748b",cursor:"pointer"}}>종일도 동일</span>
              </div>
              {/* PC 스플릿 레이아웃 */}
              <div style={{borderRadius:12,overflow:"hidden",border:"1px solid #e2e8f0",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
                <BigCalendar year={calY} month={calM} calMap={calMap}
                  isWeek={view==="week"}
                  half={view==="first"?"first":view==="second"?"second":null}
                  selDate={selDate} weekBase={selDate}
                  onCellClick={ds=>{setSelDate(ds);setDayPopup(ds);}}/>
              </div>
            </div>
          )}

          {/* ── 고객 ─────────────────────────────────────── */}
          {tab==="customers"&&(
            <div className="fade-in" style={{overflow:"hidden",width:"100%",maxWidth:"100%"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontWeight:800,fontSize:15}}>고객 ({customers.length}명)</div>
                <button className="btn-primary" onClick={()=>setCustModal("new")} style={{padding:"7px 14px",fontSize:12}}>+ 신규 등록</button>
              </div>
              {/* 검색창 */}
              <div style={{position:"relative",marginBottom:12}}>
                <input className="inp" placeholder="🔍 이름 또는 전화번호 검색 (2글자 이상)"
                  value={custQ} onChange={e=>setCustQ(e.target.value)}
                  style={{paddingRight:custQ?36:12}}/>
                {custQ&&<button onClick={()=>setCustQ("")}
                  style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
                    background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:16}}>✕</button>}
              </div>
              {custQ.length>0&&custQ.length<2&&(
                <div style={{fontSize:11,color:"#94a3b8",marginBottom:8,textAlign:"center"}}>2글자 이상 입력하세요</div>
              )}
              <div className="cust-grid" style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(3,1fr)",gap:8,width:"100%",overflow:"hidden"}}>
                {sortedCustomers.map(c=>{
                  const cRecs=records.filter(r=>r.customerId===c.id||r.customerId===String(c.id));
                  const total=cRecs.reduce((s,r)=>s+Number(r.amount||0),0);
                  const last=[...cRecs].sort((a,b)=>b.date.localeCompare(a.date))[0];
                                    return(
                    <div key={c.id} onClick={()=>setCustModal(c)}
                      style={{background:"#fff",borderRadius:10,
                        padding:isMobile?"10px 12px":"10px 12px",
                        border:"1px solid #e2e8f0",cursor:"pointer",transition:"box-shadow 0.15s",
                        width:"100%",maxWidth:"100%",boxSizing:"border-box",overflow:"hidden",
                        wordBreak:"break-all"}}
                      onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.08)"}
                      onMouseLeave={e=>e.currentTarget.style.boxShadow=""}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                        <div style={{display:"flex",alignItems:"center",gap:5,minWidth:0}}>
                          <span style={{fontWeight:800,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name||c.phone}</span>
                        </div>
                        {isAdmin&&<span style={{fontSize:11,fontWeight:700,color:"#1e293b",flexShrink:0,marginLeft:4}}>{fmtKRW(total)}</span>}
                      </div>
                      {c.name&&<div style={{fontSize:11,color:"#64748b",marginBottom:2}}>{c.phone}</div>}
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:11,color:"#94a3b8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          {(c.cars||[]).join(" · ")||"차종없음"}
                        </span>
                        {last&&<span style={{fontSize:10,color:"#cbd5e1",flexShrink:0,marginLeft:4}}>{last.date.slice(5).replace("-",".")}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
              {custQ&&sortedCustomers.length===0&&(
                <div style={{textAlign:"center",padding:"40px 0",color:"#cbd5e1",fontSize:13}}>검색 결과가 없습니다</div>
              )}
            </div>
          )}

          {/* ── 분석 ─────────────────────────────────────── */}
          {tab==="analytics"&&isAdmin&&<AnalyticsTab records={records}/>}

        </div>
      </div>

      {/* 매출현황 패널 */}
      {showSales&&isAdmin&&<SalesPanel records={records} selDate={selDate} onClose={()=>setShowSales(false)}/>}

      {/* FAB */}
      <button className="fab" onClick={()=>setBookingModal({date:today(),slot:"10:00",record:null})}>⚡</button>

      {/* 날짜 팝업 */}
      {dayPopup&&(
        <DayPopup
          date={dayPopup}
          records={records}
          customers={customers}
          onClose={()=>setDayPopup(null)}
          onEdit={r=>{setDayPopup(null);setBookingModal({date:r.date,slot:r.slot,record:r});}}
          onAdd={d=>{setDayPopup(null);setBookingModal({date:d,slot:"10:00",record:null});}}/>
      )}

      {/* 예약 모달 */}
      {bookingModal&&(
        <BookingModal modal={bookingModal} customers={customers} isAdmin={isAdmin}
          onSave={saveRecord} onSaveCust={saveCustomer} onDelete={deleteRecord} onClose={()=>setBookingModal(null)}/>
      )}

      {/* 고객 모달 */}
      {custModal&&(
        <CustomerModal
          customer={custModal==="new"?null:custModal}
          records={custModal==="new"?[]:records.filter(r=>r.customerId===custModal?.id||r.customerId===String(custModal?.id))}
          onSave={saveCustomer} onSaveRec={saveRecord} onDelete={deleteRecord} onDeleteCust={deleteCustomer} onClose={()=>setCustModal(null)}/>
      )}

      {/* 계정관리 모달 */}
      {showAccModal&&<AccountModal db={db} onClose={()=>setShowAccModal(false)}/>}

      {/* 뒤로가기 토스트 */}
      {exitToast&&<div className="toast">한 번 더 누르면 앱이 종료됩니다</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
window.addEventListener('load',function(){
  setTimeout(function(){
    var s=document.getElementById('splash');
    if(s){s.style.transition='opacity 0.5s';s.style.opacity='0';setTimeout(function(){s.remove();},500);}
  },900);
});
</script>
</body>
</html>
