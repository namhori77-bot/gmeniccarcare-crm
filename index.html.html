<script type="text/babel">
const { useState, useMemo, useEffect, useRef, useCallback } = React;

// ── 상수 ────────────────────────────────────────────
const TIME_SLOTS    = ["10:00","13:00","16:00"];
const SERVICES      = ["세차(일반)","세차(고압)","유리막 코팅","PPF","광택/폴리싱","냄새제거","엔진룸 세정","기타"];
const PAYMENTS      = ["현금","카드","계좌이체"];
const BOOKING_TYPES = ["신규","기존","단골","네이버","지메닉"];
const BT = {
  신규:  {bg:"#4caf7d22",color:"#4caf7d",border:"#4caf7d44"},
  기존:  {bg:"#5599ee22",color:"#5599ee",border:"#5599ee44"},
  단골:  {bg:"#c9a84c22",color:"#c9a84c",border:"#c9a84c44"},
  네이버:{bg:"#4caf7d22",color:"#4caf7d",border:"#4caf7d44"},
  지메닉:{bg:"#9966cc22",color:"#9966cc",border:"#9966cc44"},
};
const SC = {"10:00":"#5599ee","13:00":"#c9a84c","16:00":"#4caf7d","종일":"#9966cc"};

// ── 날짜 유틸 ────────────────────────────────────────
const todayStr  = () => new Date().toISOString().slice(0,10);
const formatKRW = n  => Number(n).toLocaleString("ko-KR")+"원";
const WD        = s  => ["일","월","화","수","목","금","토"][new Date(s).getDay()];
function addDays(s,d){ const dt=new Date(s); dt.setDate(dt.getDate()+d); return dt.toISOString().slice(0,10); }
function spanDates(s,n){ return Array.from({length:n},(_,i)=>addDays(s,i)); }
function getDays(y,m){
  const arr=[],f=new Date(y,m,1).getDay(),l=new Date(y,m+1,0).getDate();
  for(let i=0;i<f;i++) arr.push(null);
  for(let d=1;d<=l;d++) arr.push(d); return arr;
}
function getWeekDates(base){
  const dt=new Date(base),dow=dt.getDay(),sun=new Date(dt);
  sun.setDate(dt.getDate()-dow);
  return Array.from({length:7},(_,i)=>{ const d=new Date(sun); d.setDate(sun.getDate()+i); return d.toISOString().slice(0,10); });
}
function getHalfDays(y,m,half){
  const last=new Date(y,m+1,0).getDate(), s=half==="first"?1:16, e=half==="first"?15:last;
  const fdow=new Date(y,m,s).getDay(), arr=[];
  for(let i=0;i<fdow;i++) arr.push(null);
  for(let d=s;d<=e;d++) arr.push(d); return arr;
}

// ── 데이터 훅 ────────────────────────────────────────
function useData(db){
  const [customers,setCustomers]=useState([]);
  const [records,setRecords]=useState([]);
  const [loading,setLoading]=useState(true);
  const [connected,setConnected]=useState(false);
  useEffect(()=>{
    if(db){
      Promise.all([
        db.collection("customers").get().then(s=>s.docs.map(d=>({...d.data(),id:d.id}))),
        db.collection("records").get().then(s=>s.docs.map(d=>({...d.data(),id:d.id,amount:Number(d.data().amount||0),multiDay:Number(d.data().multiDay||1),services:d.data().services||[]})))
      ]).then(([c,r])=>{ setCustomers(c); setRecords(r); setLoading(false); setConnected(true); })
        .catch(()=>loadLocal());
    } else loadLocal();
  },[db]);
  function loadLocal(){
    setCustomers(JSON.parse(localStorage.getItem("crm_customers")||"[]"));
    setRecords(JSON.parse(localStorage.getItem("crm_records")||"[]"));
    setLoading(false);
  }
  async function saveCustomer(data){
    const isNew=!data.id, id=String(data.id||Date.now()), item={...data,id};
    const next=isNew?[...customers,item]:customers.map(c=>c.id===id?item:c);
    setCustomers(next);
    if(db){ const{id:_,...r}=item; await db.collection("customers").doc(id).set(r); }
    else localStorage.setItem("crm_customers",JSON.stringify(next));
  }
  async function deleteCustomer(id){
    const sid=String(id), nc=customers.filter(c=>c.id!==sid), nr=records.filter(r=>r.customerId!==sid);
    setCustomers(nc); setRecords(nr);
    if(db) await db.collection("customers").doc(sid).delete();
    else{ localStorage.setItem("crm_customers",JSON.stringify(nc)); localStorage.setItem("crm_records",JSON.stringify(nr)); }
  }
  async function saveRecord(data){
    const isNew=!data.id, id=String(data.id||Date.now());
    const item={...data,id,customerId:String(data.customerId),amount:Number(data.amount),multiDay:Number(data.multiDay||1)};
    const next=isNew?[...records,item]:records.map(r=>r.id===id?item:r);
    setRecords(next);
    if(db){ const{id:_,...r}=item; await db.collection("records").doc(id).set(r); }
    else localStorage.setItem("crm_records",JSON.stringify(next));
  }
  async function deleteRecord(id){
    const sid=String(id), next=records.filter(r=>r.id!==sid);
    setRecords(next);
    if(db) await db.collection("records").doc(sid).delete();
    else localStorage.setItem("crm_records",JSON.stringify(next));
  }
  return{customers,records,loading,connected,saveCustomer,deleteCustomer,saveRecord,deleteRecord};
}

// ── 매출 패널 ────────────────────────────────────────
function SalesPanel({records,selectedDate,onClose}){
  const ref=useRef(null);
  useEffect(()=>{
    const h=e=>{ if(ref.current&&!ref.current.contains(e.target)) onClose(); };
    setTimeout(()=>document.addEventListener("mousedown",h),50);
    return()=>document.removeEventListener("mousedown",h);
  },[onClose]);
  const stats=useMemo(()=>{
    const now=new Date(), tm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    const wk=getWeekDates(selectedDate), wkS=wk[0], wkE=wk[6];
    const dayR=records.filter(r=>r.date===selectedDate);
    const wkR=records.filter(r=>r.date>=wkS&&r.date<=wkE);
    const moR=records.filter(r=>r.date.startsWith(tm));
    const sum=a=>a.reduce((s,r)=>s+Number(r.amount),0);
    const byPay={}; PAYMENTS.forEach(p=>byPay[p]=0);
    dayR.forEach(r=>{byPay[r.payment]=(byPay[r.payment]||0)+Number(r.amount);});
    const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    return{
      day:{total:sum(dayR),count:dayR.length,byPay},
      week:{total:sum(wkR),count:wkR.length,label:`${wkS.slice(5).replace("-",".")}~${wkE.slice(5).replace("-",".")}`},
      month:{total:sum(moR),count:moR.length,pct:Math.round((now.getDate()/dim)*100),label:`${now.getFullYear()}.${now.getMonth()+1}`},
    };
  },[records,selectedDate]);

  const GoldNum = ({v,size=28})=>(
    <div style={{fontSize:size,fontWeight:900,background:`linear-gradient(135deg, #f5e0a0, #c9a84c)`,
      WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1.2,fontFamily:"'Bebas Neue',sans-serif",
      letterSpacing:1}}>{v}</div>
  );

  return(
    <>
      <div style={{position:"fixed",inset:0,zIndex:199,background:"rgba(0,0,0,0.6)"}} onClick={onClose}/>
      <div ref={ref} style={{position:"fixed",top:0,left:0,bottom:0,zIndex:200,width:270,
        background:"linear-gradient(180deg,#111118 0%,#0a0a0f 100%)",
        borderRight:"1px solid #c9a84c44",
        boxShadow:"8px 0 40px rgba(0,0,0,0.6)",
        padding:"24px 20px",display:"flex",flexDirection:"column",overflowY:"auto",
        animation:"slideIn 0.25s ease"}}>
        {/* 골드 라인 */}
        <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#c9a84c,transparent)"}}/>
        <div style={{width:36,height:3,background:"linear-gradient(90deg,#c9a84c,#e8c96a)",borderRadius:2,margin:"0 auto 20px"}}/>

        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:3,
          background:"linear-gradient(135deg,#f5e0a0,#c9a84c)",WebkitBackgroundClip:"text",
          WebkitTextFillColor:"transparent",marginBottom:24}}>
          REVENUE
        </div>

        {/* 일 매출 */}
        <div style={{marginBottom:4,padding:"16px",background:"#1a1a24",borderRadius:12,border:"1px solid #2a2830"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#c9a84c",letterSpacing:2,marginBottom:10,textTransform:"uppercase"}}>
            TODAY · {selectedDate.slice(5).replace("-",".")} {WD(selectedDate)}
          </div>
          <GoldNum v={formatKRW(stats.day.total)} size={30}/>
          <div style={{fontSize:12,color:"#8a8070",marginTop:4,marginBottom:stats.day.total>0?10:0}}>{stats.day.count}건</div>
          {stats.day.total>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {PAYMENTS.map(p=>stats.day.byPay[p]>0&&(
                <span key={p} style={{fontSize:10,background:"#c9a84c22",color:"#c9a84c",
                  padding:"2px 8px",borderRadius:6,fontWeight:600,border:"1px solid #c9a84c33"}}>
                  {p} {formatKRW(stats.day.byPay[p])}
                </span>
              ))}
            </div>
          )}
        </div>

        <div style={{height:1,background:"linear-gradient(90deg,transparent,#2a2830,transparent)",margin:"14px 0"}}/>

        {/* 주 매출 */}
        <div style={{marginBottom:4,padding:"14px",background:"#1a1a24",borderRadius:12,border:"1px solid #2a2830"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#8a8070",letterSpacing:2,marginBottom:8,textTransform:"uppercase"}}>
            WEEK · {stats.week.label}
          </div>
          <GoldNum v={formatKRW(stats.week.total)} size={22}/>
          <div style={{fontSize:12,color:"#8a8070",marginTop:4}}>{stats.week.count}건</div>
        </div>

        <div style={{height:1,background:"linear-gradient(90deg,transparent,#2a2830,transparent)",margin:"14px 0"}}/>

        {/* 월 매출 */}
        <div style={{padding:"14px",background:"#1a1a24",borderRadius:12,border:"1px solid #2a2830"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#8a8070",letterSpacing:2,marginBottom:8,textTransform:"uppercase"}}>
            MONTH · {stats.month.label}
          </div>
          <GoldNum v={formatKRW(stats.month.total)} size={22}/>
          <div style={{fontSize:12,color:"#8a8070",marginTop:4,marginBottom:12}}>{stats.month.count}건</div>
          <div style={{height:4,background:"#2a2830",borderRadius:2}}>
            <div style={{height:4,background:"linear-gradient(90deg,#c9a84c,#e8c96a)",borderRadius:2,
              width:`${stats.month.pct}%`,transition:"width 0.6s ease",boxShadow:"0 0 8px #c9a84c88"}}/>
          </div>
          <div style={{fontSize:11,color:"#c9a84c",marginTop:5,textAlign:"right",fontWeight:600}}>{stats.month.pct}%</div>
        </div>

        <button onClick={onClose} style={{marginTop:"auto",paddingTop:20,background:"none",border:"none",
          color:"#4a4540",fontSize:12,cursor:"pointer",letterSpacing:1}}>CLOSE</button>
      </div>
    </>
  );
}

// ── 달력 ─────────────────────────────────────────────
function BigCalendar({days,calYear,calMonth,calendarMap,isWeek,onSelectDate,onAddBooking,selectedDate}){
  return(
    <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
      <div style={{minWidth:isWeek?"100%":"560px"}}>
        {/* 요일 헤더 */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:"#0a0a0f"}}>
          {["SUN","MON","TUE","WED","THU","FRI","SAT"].map((d,i)=>(
            <div key={d} style={{background:"#111118",textAlign:"center",padding:"8px 0",
              fontSize:9,fontWeight:700,letterSpacing:1.5,fontFamily:"'Bebas Neue',sans-serif",
              color:i===0?"#e05555":i===6?"#5599ee":"#4a4540"}}>
              {d}
            </div>
          ))}
        </div>
        {/* 날짜 셀 */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:"#0a0a0f"}}>
          {days.map((d,i)=>{
            if(!d) return <div key={`e${i}`} style={{background:"#0d0d14",minHeight:isWeek?120:88}}/>;
            const ds=isWeek?d:`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            const isToday=ds===todayStr(), isSel=ds===selectedDate;
            const dayData=calendarMap[ds]||[];
            const allDayItem=dayData.find(r=>r.slot==="종일");
            const timeItems=dayData.filter(r=>r.slot!=="종일");
            const isContDay=allDayItem&&allDayItem.date!==ds;
            const dow=new Date(ds).getDay();
            const displayDay=isWeek?Number(ds.slice(8)):d;
            return(
              <div key={i} onClick={()=>onSelectDate(ds)}
                style={{
                  background:isSel?"#1e1a10":isToday?"#141420":"#111118",
                  minHeight:isWeek?120:88,padding:"5px 4px",cursor:"pointer",
                  borderTop:isSel?"2px solid #c9a84c":isToday?"2px solid #c9a84c44":"2px solid transparent",
                  transition:"background 0.15s",
                  boxShadow:isSel?"inset 0 0 20px #c9a84c11":"none",
                }}>
                {/* 날짜 + 버튼 */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{
                    fontSize:isWeek?15:12,fontWeight:700,
                    fontFamily:"'Bebas Neue',sans-serif",letterSpacing:0.5,
                    color:isSel?"#c9a84c":isToday?"#e8c96a":dow===0?"#e05555":dow===6?"#5599ee":"#6a6460",
                  }}>
                    {isToday&&<span style={{fontSize:7,marginRight:2,color:"#c9a84c"}}>●</span>}
                    {displayDay}
                  </span>
                  <button onClick={e=>{e.stopPropagation();onAddBooking(ds);}}
                    style={{width:15,height:15,borderRadius:"50%",border:"1px solid #2a2830",
                      background:"#1a1a24",color:"#c9a84c",fontSize:11,fontWeight:700,cursor:"pointer",
                      display:"flex",alignItems:"center",justifyContent:"center",padding:0,flexShrink:0,
                      lineHeight:1}}>+</button>
                </div>
                {/* 종일 */}
                {allDayItem&&(
                  <div style={{fontSize:8,fontWeight:700,borderRadius:3,padding:"2px 4px",marginBottom:2,
                    background:isContDay?"#c9a84c22":"#9966cc33",
                    color:isContDay?"#c9a84c":"#9966cc",
                    border:`1px solid ${isContDay?"#c9a84c44":"#9966cc44"}`,
                    whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                    {isContDay?"↩작업중":`◆${allDayItem._custName||"종일"}`}
                  </div>
                )}
                {/* 시간 예약 */}
                {timeItems.slice(0,isWeek?3:2).map((r,ri)=>(
                  <div key={ri} style={{fontSize:8,borderRadius:3,padding:"2px 4px",marginBottom:2,
                    background:(SC[r.slot]||"#999")+"22",
                    borderLeft:`2px solid ${SC[r.slot]||"#999"}`,
                    whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                    color:"#c0b89a",fontWeight:500}}>
                    <span style={{color:SC[r.slot]||"#999",fontWeight:700,fontSize:7}}>{r.slot} </span>
                    {r._custName||"예약"}
                  </div>
                ))}
                {timeItems.length>(isWeek?3:2)&&(
                  <div style={{fontSize:8,color:"#4a4540",paddingLeft:4}}>+{timeItems.length-(isWeek?3:2)}</div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── 메인 앱 ──────────────────────────────────────────
function App(){
  const db=window.__db;
  const {customers,records,loading,connected,saveCustomer,deleteCustomer,saveRecord,deleteRecord}=useData(db);
  const [tab,setTab]=useState("calendar");
  const [selDate,setSelDate]=useState(todayStr());
  const [calY,setCalY]=useState(new Date().getFullYear());
  const [calM,setCalM]=useState(new Date().getMonth());
  const [view,setView]=useState("month");
  const [showSales,setShowSales]=useState(false);
  const [bookingModal,setBookingModal]=useState(null);
  const [custModal,setCustModal]=useState(null);
  const closeSales=useCallback(()=>setShowSales(false),[]);

  function goPrev(){
    if(view==="week"){setSelDate(d=>addDays(d,-7));return;}
    if(view==="first"){setView("second");if(calM===0){setCalY(y=>y-1);setCalM(11);}else setCalM(m=>m-1);return;}
    if(view==="second"){setView("first");return;}
    if(calM===0){setCalY(y=>y-1);setCalM(11);}else setCalM(m=>m-1);
  }
  function goNext(){
    if(view==="week"){setSelDate(d=>addDays(d,7));return;}
    if(view==="first"){setView("second");return;}
    if(view==="second"){setView("first");if(calM===11){setCalY(y=>y+1);setCalM(0);}else setCalM(m=>m+1);return;}
    if(calM===11){setCalY(y=>y+1);setCalM(0);}else setCalM(m=>m+1);
  }

  const calTitle=useMemo(()=>{
    if(view==="week"){const wk=getWeekDates(selDate);return`${wk[0].slice(5).replace("-",".")} ~ ${wk[6].slice(5).replace("-",".")}`;}
    if(view==="first")return`${calY}.${calM+1} 전반`;
    if(view==="second")return`${calY}.${calM+1} 후반`;
    return`${calY}.${String(calM+1).padStart(2,"0")}`;
  },[view,calY,calM,selDate]);

  const calDays=useMemo(()=>{
    if(view==="week")return getWeekDates(selDate);
    if(view==="first")return getHalfDays(calY,calM,"first");
    if(view==="second")return getHalfDays(calY,calM,"second");
    return getDays(calY,calM);
  },[view,calY,calM,selDate]);

  const calendarMap=useMemo(()=>{
    const map={};
    records.forEach(r=>{
      const cust=customers.find(c=>c.id===r.customerId||c.id===String(r.customerId));
      spanDates(r.date,r.multiDay||1).forEach((d,idx)=>{
        if(!map[d])map[d]=[];
        map[d].push({...r,_spanIdx:idx,_custName:cust?.name||""});
      });
    });
    return map;
  },[records,customers]);

  const getCustomer=id=>customers.find(c=>c.id===id||c.id===String(id));
  function getAllDayRec(date){ return records.find(r=>{ if(r.slot!=="종일")return false; return spanDates(r.date,r.multiDay||1).includes(date); }); }
  function getSlotRec(date,slot){
    if(slot==="종일")return records.find(r=>r.date===date&&r.slot==="종일");
    return records.find(r=>r.date===date&&r.slot===slot&&r.slot!=="종일");
  }

  const allDayRec=getAllDayRec(selDate);
  const isBlocked=!!allDayRec;
  const isCont=allDayRec&&allDayRec.date!==selDate;

  if(loading) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16,background:"#0a0a0f"}}>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:4,
        background:"linear-gradient(135deg,#f5e0a0,#c9a84c)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
        GMENIC CAR CARE
      </div>
      <div style={{width:60,height:2,background:"linear-gradient(90deg,transparent,#c9a84c,transparent)",animation:"pulse 1.5s infinite"}}/>
      <div style={{fontSize:12,color:"#4a4540",letterSpacing:2}}>{db?"CONNECTING FIREBASE...":"LOADING..."}</div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--text)"}}>

      {/* ── 헤더 ── */}
      <header style={{background:"linear-gradient(180deg,#111118,#0d0d14)",borderBottom:"1px solid #c9a84c33",
        padding:"12px 16px",position:"sticky",top:0,zIndex:50,
        boxShadow:"0 4px 20px rgba(0,0,0,0.5)"}}>
        {/* 골드 상단 라인 */}
        <div style={{position:"absolute",top:0,left:0,right:0,height:2,
          background:"linear-gradient(90deg,transparent 0%,#c9a84c 30%,#e8c96a 50%,#c9a84c 70%,transparent 100%)"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>setShowSales(v=>!v)}
              style={{background:"#c9a84c22",border:"1px solid #c9a84c44",borderRadius:8,
                padding:"7px 9px",cursor:"pointer",fontSize:14,transition:"all 0.2s",
                boxShadow:showSales?"0 0 12px #c9a84c44":"none"}}>
              💰
            </button>
            <div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,
                background:"linear-gradient(135deg,#f5e0a0,#c9a84c)",
                WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
                GMENIC CAR CARE CRM
              </div>
              <div style={{fontSize:10,color:"#4a4540",letterSpacing:1,marginTop:1}}>
                HAEUNDAE · {connected?"🔥 FIREBASE":"💾 LOCAL"}
              </div>
            </div>
          </div>
          <div style={{background:"#c9a84c22",border:"1px solid #c9a84c44",color:"#c9a84c",
            padding:"4px 10px",borderRadius:8,fontSize:11,fontWeight:700,letterSpacing:1}}>
            {todayStr().slice(5).replace("-",".")} {WD(todayStr())}
          </div>
        </div>
      </header>

      {showSales&&<SalesPanel records={records} selectedDate={selDate} onClose={closeSales}/>}

      {/* ── 탭 ── */}
      <nav style={{display:"flex",background:"#0d0d14",borderBottom:"1px solid #1a1a24"}}>
        {[["calendar","캘린더"],["customers","고객"],["analytics","분석"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{flex:1,padding:"13px 0",border:"none",background:"none",
              fontSize:12,cursor:"pointer",fontWeight:700,letterSpacing:1.5,
              fontFamily:"'Bebas Neue',sans-serif",
              color:tab===k?"#c9a84c":"#4a4540",
              borderBottom:tab===k?"2px solid #c9a84c":"2px solid transparent",
              transition:"all 0.2s"}}>
            {l}
          </button>
        ))}
      </nav>

      <main style={{padding:"12px",maxWidth:600,margin:"0 auto"}}>

        {/* ══ 캘린더 탭 ══ */}
        {tab==="calendar"&&(
          <div style={{animation:"fadeUp 0.3s ease"}}>
            {/* 툴바 */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,gap:8}}>
              <div style={{display:"flex",background:"#111118",borderRadius:8,padding:2,gap:1,border:"1px solid #1a1a24"}}>
                {[["month","월"],["first","전반"],["second","후반"],["week","주"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setView(v)}
                    style={{padding:"5px 10px",border:"none",fontSize:11,fontWeight:700,cursor:"pointer",borderRadius:6,
                      background:view===v?"#c9a84c22":"none",
                      color:view===v?"#c9a84c":"#4a4540",
                      boxShadow:view===v?"0 0 8px #c9a84c33":"none",
                      letterSpacing:0.5,transition:"all 0.2s"}}>{l}</button>
                ))}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button onClick={goPrev} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#c9a84c",padding:"0 4px"}}>‹</button>
                <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color:"#c9a84c",minWidth:100,textAlign:"center",letterSpacing:1}}>{calTitle}</span>
                <button onClick={goNext} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#c9a84c",padding:"0 4px"}}>›</button>
              </div>
            </div>

            {/* 범례 */}
            <div style={{display:"flex",gap:12,marginBottom:8}}>
              {[...TIME_SLOTS,"종일"].map(s=>(
                <span key={s} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#4a4540"}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:SC[s],display:"inline-block",boxShadow:`0 0 4px ${SC[s]}`}}/>
                  {s}
                </span>
              ))}
            </div>

            {/* 달력 */}
            <div style={{borderRadius:12,overflow:"hidden",border:"1px solid #c9a84c22",marginBottom:14,
              boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>
              <BigCalendar days={calDays} calYear={calY} calMonth={calM} calendarMap={calendarMap}
                isWeek={view==="week"} onSelectDate={setSelDate}
                onAddBooking={date=>setBookingModal({date,slot:"10:00",record:null})}
                selectedDate={selDate}/>
            </div>

            {/* 선택일 헤더 */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div>
                <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:1,color:"#c9a84c"}}>{selDate.replace(/-/g,".")}</span>
                <span style={{fontSize:12,color:"#4a4540",marginLeft:6}}>{WD(selDate)}요일</span>
              </div>
              <button onClick={()=>setBookingModal({date:selDate,slot:"10:00",record:null})}
                style={{background:"linear-gradient(135deg,#c9a84c,#e8c96a)",color:"#0a0a0f",
                  border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,cursor:"pointer",fontWeight:700,
                  boxShadow:"0 2px 12px #c9a84c44"}}>
                + 예약 추가
              </button>
            </div>

            {/* 연속 배너 */}
            {isBlocked&&isCont&&(
              <div onClick={()=>setBookingModal({date:allDayRec.date,slot:"종일",record:allDayRec})}
                style={{display:"flex",alignItems:"center",gap:10,
                  background:"linear-gradient(135deg,#9966cc22,#9966cc11)",
                  borderRadius:12,padding:"12px 14px",marginBottom:8,
                  border:"1px solid #9966cc44",cursor:"pointer"}}>
                <div style={{fontSize:20}}>🔧</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,color:"#9966cc",fontSize:13,letterSpacing:0.5}}>연속 작업 진행중</div>
                  <div style={{fontSize:12,color:"#8a8070",marginTop:2}}>{getCustomer(allDayRec.customerId)?.name} · {(allDayRec.services||[]).join(", ")}</div>
                  <div style={{fontSize:11,color:"#6a6070",marginTop:1}}>📅 {allDayRec.date} ~ {addDays(allDayRec.date,(allDayRec.multiDay||1)-1)}</div>
                </div>
                <span style={{fontSize:11,color:"#9966cc"}}>›</span>
              </div>
            )}

            {/* 종일 슬롯 */}
            {!isCont&&(()=>{
              const rec=getSlotRec(selDate,"종일"), cust=rec?getCustomer(rec.customerId):null;
              const btc=cust?BT[cust.bookingType]:null;
              return(
                <div onClick={()=>setBookingModal({date:selDate,slot:"종일",record:rec||null})}
                  style={{borderRadius:12,padding:"12px 14px",marginBottom:8,cursor:"pointer",
                    background:rec?"linear-gradient(135deg,#9966cc22,#9966cc11)":"#111118",
                    border:`1px solid ${rec?"#9966cc44":"#1a1a24"}`,
                    borderStyle:rec?"solid":"dashed",transition:"all 0.2s"}}>
                  {rec&&cust?(
                    <>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{display:"flex",gap:6,alignItems:"center"}}>
                          <span style={{fontSize:10,fontWeight:700,background:"#9966cc33",color:"#9966cc",padding:"2px 8px",borderRadius:6,border:"1px solid #9966cc44"}}>◆ 종일</span>
                          {rec.multiDay>1&&<span style={{fontSize:10,fontWeight:700,background:"#e0555522",color:"#e05555",padding:"2px 8px",borderRadius:6,border:"1px solid #e0555544"}}>{rec.multiDay}일</span>}
                        </div>
                        {btc&&<span style={{fontSize:10,fontWeight:700,background:btc.bg,color:btc.color,padding:"2px 8px",borderRadius:6,border:`1px solid ${btc.border}`}}>{cust.bookingType}</span>}
                      </div>
                      <div style={{fontWeight:800,fontSize:15,color:"#f0ece0",marginTop:8}}>{cust.name}</div>
                      <div style={{fontSize:12,color:"#8a8070",marginTop:2}}>{cust.carModel} · {(rec.services||[]).join(", ")}</div>
                      <div style={{fontSize:13,color:"#c9a84c",fontWeight:700,marginTop:4}}>{formatKRW(rec.amount)} · {rec.payment}</div>
                    </>
                  ):(
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:10,fontWeight:700,background:"#1a1a24",color:"#4a4540",padding:"2px 8px",borderRadius:6,border:"1px solid #2a2830"}}>◆ 종일</span>
                      <span style={{color:"#4a4540",fontSize:12}}>+ 종일 / 장기 작업 등록</span>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* 구분선 */}
            <div style={{display:"flex",alignItems:"center",margin:"10px 0 8px",gap:8}}>
              <div style={{flex:1,height:1,background:"linear-gradient(90deg,#c9a84c44,transparent)"}}/>
              <span style={{fontSize:9,fontWeight:700,color:"#4a4540",letterSpacing:2,fontFamily:"'Bebas Neue',sans-serif"}}>TIME SLOTS</span>
              <div style={{flex:1,height:1,background:"linear-gradient(90deg,transparent,#c9a84c44)"}}/>
            </div>

            {/* 시간 슬롯 */}
            {TIME_SLOTS.map(slot=>{
              const rec=getSlotRec(selDate,slot), cust=rec?getCustomer(rec.customerId):null;
              const blocked=isBlocked&&!rec, btc=cust?BT[cust.bookingType]:null;
              const sc=SC[slot];
              return(
                <div key={slot} onClick={()=>{if(!blocked)setBookingModal({date:selDate,slot,record:rec||null});}}
                  style={{background:rec?"#111118":"#0d0d14",borderRadius:12,padding:"12px 14px",marginBottom:7,
                    display:"flex",alignItems:"center",gap:12,
                    border:`1px solid ${rec?sc+"44":"#1a1a24"}`,
                    boxShadow:rec?`0 2px 12px ${sc}22`:"none",
                    cursor:blocked?"not-allowed":"pointer",opacity:blocked?0.3:1,
                    transition:"all 0.2s"}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,minWidth:44,
                    color:sc,letterSpacing:0.5,textShadow:`0 0 8px ${sc}88`}}>{slot}</div>
                  {blocked?<div style={{color:"#2a2830",fontSize:12,letterSpacing:1}}>🔒 FULL DAY</div>
                  :rec&&cust?(
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={{fontWeight:700,fontSize:14,color:"#f0ece0"}}>{cust.name}</span>
                        {btc&&<span style={{fontSize:9,fontWeight:700,background:btc.bg,color:btc.color,padding:"1px 6px",borderRadius:5,border:`1px solid ${btc.border}`}}>{cust.bookingType}</span>}
                      </div>
                      <div style={{fontSize:11,color:"#6a6460",marginTop:2}}>{cust.carModel} · {(rec.services||[]).join(", ")}</div>
                      <div style={{fontSize:12,fontWeight:700,marginTop:3,color:sc}}>{formatKRW(rec.amount)} · {rec.payment}</div>
                      {rec.memo&&<div style={{fontSize:10,color:"#4a4540",marginTop:2}}>📝 {rec.memo}</div>}
                    </div>
                  ):<div style={{color:"#2a2830",fontSize:12,letterSpacing:1}}>+ ADD BOOKING</div>}
                </div>
              );
            })}
          </div>
        )}

        {/* ══ 고객 탭 ══ */}
        {tab==="customers"&&(
          <div style={{animation:"fadeUp 0.3s ease"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:2,color:"#c9a84c"}}>CUSTOMERS</div>
                <div style={{fontSize:11,color:"#4a4540",marginTop:1}}>{customers.length}명 등록</div>
              </div>
              <button onClick={()=>setCustModal("new")}
                style={{background:"linear-gradient(135deg,#c9a84c,#e8c96a)",color:"#0a0a0f",
                  border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,cursor:"pointer",fontWeight:700,
                  boxShadow:"0 2px 12px #c9a84c44"}}>
                + 신규 등록
              </button>
            </div>
            {customers.length===0&&(
              <div style={{textAlign:"center",padding:"50px 0",color:"#2a2830",fontSize:13,letterSpacing:1}}>
                NO CUSTOMERS YET
              </div>
            )}
            {customers.map(c=>{
              const cRecs=records.filter(r=>r.customerId===c.id||r.customerId===String(c.id));
              const total=cRecs.reduce((s,r)=>s+Number(r.amount),0);
              const last=[...cRecs].sort((a,b)=>b.date.localeCompare(a.date))[0];
              const btc=BT[c.bookingType]||BT["신규"];
              return(
                <div key={c.id} onClick={()=>setCustModal(c)}
                  style={{background:"#111118",borderRadius:12,padding:"13px 14px",marginBottom:8,
                    border:"1px solid #1a1a24",cursor:"pointer",transition:"all 0.2s",
                    boxShadow:"0 2px 8px rgba(0,0,0,0.3)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontWeight:700,fontSize:14,color:"#f0ece0"}}>{c.name}</span>
                      <span style={{fontSize:9,fontWeight:700,background:btc.bg,color:btc.color,
                        padding:"1px 6px",borderRadius:5,border:`1px solid ${btc.border}`}}>{c.bookingType}</span>
                    </div>
                    <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:0.5,
                      background:"linear-gradient(135deg,#f5e0a0,#c9a84c)",
                      WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{formatKRW(total)}</span>
                  </div>
                  <div style={{fontSize:11,color:"#4a4540",marginTop:4}}>{c.carModel} · {c.phone}</div>
                  {last&&<div style={{fontSize:10,color:"#3a3430",marginTop:2}}>최근: {last.date} · {(last.services||[]).join(", ")}</div>}
                  {c.memo&&<div style={{fontSize:10,color:"#c9a84c88",marginTop:2}}>📝 {c.memo}</div>}
                </div>
              );
            })}
          </div>
        )}

        {/* ══ 분석 탭 ══ */}
        {tab==="analytics"&&(()=>{
          const now=new Date();
          const tm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
          const lmd=new Date(now.getFullYear(),now.getMonth()-1,1);
          const lm=`${lmd.getFullYear()}-${String(lmd.getMonth()+1).padStart(2,"0")}`;
          const tR=records.filter(r=>r.date.startsWith(tm));
          const lR=records.filter(r=>r.date.startsWith(lm));
          const svcRev={}; SERVICES.forEach(s=>svcRev[s]=0);
          records.forEach(r=>(r.services||[]).forEach(s=>{svcRev[s]=(svcRev[s]||0)+Number(r.amount)/(r.services.length||1);}));
          const maxRev=Math.max(...Object.values(svcRev),1);
          const totalAll=records.reduce((s,r)=>s+Number(r.amount),0);

          const GoldStat=({label,value,sub})=>(
            <div style={{background:"#111118",borderRadius:12,padding:"14px 10px",textAlign:"center",border:"1px solid #1a1a24"}}>
              <div style={{fontSize:9,fontWeight:700,color:"#4a4540",letterSpacing:1.5,marginBottom:6,fontFamily:"'Bebas Neue',sans-serif"}}>{label}</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:0.5,
                background:"linear-gradient(135deg,#f5e0a0,#c9a84c)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
                {value}
              </div>
              {sub&&<div style={{fontSize:9,color:"#3a3430",marginTop:2}}>{sub}</div>}
            </div>
          );

          return(
            <div style={{animation:"fadeUp 0.3s ease"}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:2,color:"#c9a84c",marginBottom:14}}>ANALYTICS</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                <GoldStat label="THIS MONTH" value={formatKRW(tR.reduce((s,r)=>s+Number(r.amount),0))} sub={tR.length+"건"}/>
                <GoldStat label="LAST MONTH" value={formatKRW(lR.reduce((s,r)=>s+Number(r.amount),0))}/>
                <GoldStat label="TOTAL" value={formatKRW(totalAll)}/>
              </div>

              {/* 서비스별 매출 */}
              <div style={{background:"#111118",borderRadius:12,padding:14,marginBottom:12,border:"1px solid #1a1a24"}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:2,color:"#c9a84c",marginBottom:14}}>SERVICE REVENUE</div>
                {Object.entries(svcRev).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([svc,amt])=>(
                  <div key={svc} style={{marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:12,color:"#8a8070"}}>{svc}</span>
                      <span style={{fontSize:12,fontWeight:700,color:"#c9a84c"}}>{formatKRW(Math.round(amt))}</span>
                    </div>
                    <div style={{height:4,background:"#1a1a24",borderRadius:2}}>
                      <div style={{height:4,background:"linear-gradient(90deg,#c9a84c,#e8c96a)",borderRadius:2,
                        width:`${(amt/maxRev)*100}%`,boxShadow:"0 0 6px #c9a84c66",transition:"width 0.5s"}}/>
                    </div>
                  </div>
                ))}
              </div>

              {/* 예약구분별 */}
              <div style={{background:"#111118",borderRadius:12,padding:14,border:"1px solid #1a1a24"}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:2,color:"#c9a84c",marginBottom:14}}>BOOKING SOURCE</div>
                {BOOKING_TYPES.map(bt=>{
                  const cnt=customers.filter(c=>c.bookingType===bt).length;
                  const rev=records.filter(r=>{const c=getCustomer(r.customerId);return c?.bookingType===bt;}).reduce((s,r)=>s+Number(r.amount),0);
                  if(!cnt)return null;
                  const btc=BT[bt];
                  return(
                    <div key={bt} style={{borderRadius:10,padding:"10px 12px",marginBottom:8,
                      background:btc.bg,border:`1px solid ${btc.border}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:11,fontWeight:700,color:btc.color,letterSpacing:0.5}}>{bt}</span>
                        <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:0.5,color:btc.color}}>{formatKRW(rev)}</span>
                      </div>
                      <div style={{fontSize:11,color:"#4a4540",marginTop:3}}>{cnt}명</div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}
      </main>

      {bookingModal&&(
        <BookingModal modal={bookingModal} customers={customers}
          onSave={async d=>{await saveRecord(d);setBookingModal(null);}}
          onDelete={async id=>{await deleteRecord(id);setBookingModal(null);}}
          onClose={()=>setBookingModal(null)}
          onAddCustomer={()=>{setBookingModal(null);setCustModal("new");}}
        />
      )}
      {custModal&&(
        <CustomerModal
          customer={custModal==="new"?null:custModal}
          records={records.filter(r=>custModal!=="new"&&(r.customerId===custModal.id||r.customerId===String(custModal.id)))}
          onSave={async d=>{await saveCustomer(d);setCustModal(null);}}
          onDelete={async id=>{await deleteCustomer(id);setCustModal(null);}}
          onClose={()=>setCustModal(null)}
        />
      )}
    </div>
  );
}

// ── 공통 필드 컴포넌트 ───────────────────────────────
function NF({label,children}){
  return(
    <div style={{marginBottom:16}}>
      <div style={{fontSize:9,fontWeight:700,color:"#4a4540",letterSpacing:2,marginBottom:8,
        fontFamily:"'Bebas Neue',sans-serif"}}>{label}</div>
      {children}
    </div>
  );
}

// ── 예약 모달 ────────────────────────────────────────
function BookingModal({modal,customers,onSave,onDelete,onClose,onAddCustomer}){
  const ex=modal.record, isAD=modal.slot==="종일";
  const [slotType,setSlotType]=useState(isAD?"종일":"시간");
  const [slotTime,setSlotTime]=useState(isAD?null:(ex?.slot||modal.slot));
  const [multiDay,setMultiDay]=useState(Number(ex?.multiDay)||1);
  const [custId,setCustId]=useState(ex?.customerId||"");
  const [services,setServices]=useState(ex?.services||[]);
  const [amount,setAmount]=useState(ex?.amount||"");
  const [payment,setPayment]=useState(ex?.payment||"카드");
  const [memo,setMemo]=useState(ex?.memo||"");
  const selCust=customers.find(c=>c.id===String(custId)||c.id===custId);
  const toggle=s=>setServices(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);
  function handleSave(){
    if(!custId||!services.length||!amount)return alert("고객, 작업내용, 가격을 입력해주세요.");
    const fs=slotType==="종일"?"종일":slotTime;
    if(slotType==="시간"&&!fs)return alert("시간을 선택해주세요.");
    onSave({id:ex?.id,customerId:String(custId),date:modal.date,slot:fs,multiDay:slotType==="종일"?multiDay:1,services,payment,amount:Number(amount),memo});
  }

  const inputStyle={width:"100%",padding:"10px 12px",border:"1px solid #2a2830",borderRadius:8,fontSize:13,boxSizing:"border-box",background:"#1a1a24",color:"#f0ece0"};
  const chipBase={padding:"6px 12px",borderRadius:8,border:"1px solid",fontSize:12,cursor:"pointer",fontWeight:600,transition:"all 0.15s"};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:100,
      display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:"#111118",borderRadius:"20px 20px 0 0",padding:20,width:"100%",
        maxWidth:520,maxHeight:"92vh",overflowY:"auto",animation:"fadeUp 0.2s ease",
        borderTop:"1px solid #c9a84c44",
        boxShadow:"0 -8px 40px rgba(0,0,0,0.6)"}} onClick={e=>e.stopPropagation()}>
        {/* 골드 핸들 */}
        <div style={{width:40,height:3,background:"linear-gradient(90deg,#c9a84c,#e8c96a)",borderRadius:2,margin:"0 auto 16px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,color:"#c9a84c"}}>
            {ex?"EDIT BOOKING":"NEW BOOKING"}
          </span>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#4a4540"}}>✕</button>
        </div>

        <NF label="예약날짜">
          <div style={{fontSize:14,fontWeight:700,color:"#c9a84c",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>
            {modal.date.replace(/-/g,".")} · {WD(modal.date)}
          </div>
        </NF>

        <NF label="예약시간">
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {TIME_SLOTS.map(s=>(
              <button key={s} onClick={()=>{setSlotType("시간");setSlotTime(s);}}
                style={{...chipBase,borderColor:slotType==="시간"&&slotTime===s?SC[s]:"#2a2830",
                  background:slotType==="시간"&&slotTime===s?SC[s]+"33":"#1a1a24",
                  color:slotType==="시간"&&slotTime===s?SC[s]:"#4a4540",
                  boxShadow:slotType==="시간"&&slotTime===s?`0 0 8px ${SC[s]}66`:"none"}}>{s}</button>
            ))}
            <button onClick={()=>setSlotType("종일")}
              style={{...chipBase,borderColor:slotType==="종일"?"#9966cc":"#2a2830",
                background:slotType==="종일"?"#9966cc33":"#1a1a24",
                color:slotType==="종일"?"#9966cc":"#4a4540"}}>◆ 종일</button>
          </div>
          {slotType==="종일"&&(
            <div style={{marginTop:10}}>
              <div style={{fontSize:9,color:"#4a4540",letterSpacing:2,marginBottom:8,fontFamily:"'Bebas Neue',sans-serif"}}>작업기간</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {[1,2,3,4,5,6,7].map(d=>(
                  <button key={d} onClick={()=>setMultiDay(d)}
                    style={{...chipBase,borderColor:multiDay===d?"#e05555":"#2a2830",
                      background:multiDay===d?"#e0555533":"#1a1a24",
                      color:multiDay===d?"#e05555":"#4a4540"}}>{d}일</button>
                ))}
              </div>
              {multiDay>1&&<div style={{background:"#e0555511",borderRadius:7,padding:"7px 10px",fontSize:11,color:"#e05555",fontWeight:600,marginTop:8,border:"1px solid #e0555533"}}>
                {modal.date.replace(/-/g,".")}({WD(modal.date)}) ~ {addDays(modal.date,multiDay-1).replace(/-/g,".")}({WD(addDays(modal.date,multiDay-1))}) · {multiDay}일간
              </div>}
            </div>
          )}
        </NF>

        <NF label="고객명">
          <div style={{display:"flex",gap:8}}>
            <select value={custId} onChange={e=>setCustId(e.target.value)} style={{...inputStyle,flex:1}}>
              <option value="">-- 고객 선택 --</option>
              {customers.map(c=><option key={c.id} value={c.id}>{c.name} ({c.carModel})</option>)}
            </select>
            <button onClick={onAddCustomer}
              style={{...chipBase,borderColor:"#2a2830",background:"#1a1a24",color:"#4a4540",whiteSpace:"nowrap"}}>+ 신규</button>
          </div>
        </NF>

        {selCust&&(
          <>
            <NF label="예약구분">
              <span style={{fontSize:11,fontWeight:700,background:BT[selCust.bookingType]?.bg,
                color:BT[selCust.bookingType]?.color,padding:"3px 10px",borderRadius:6,
                border:`1px solid ${BT[selCust.bookingType]?.border}`}}>{selCust.bookingType}</span>
            </NF>
            <NF label="차종">
              <div style={{fontSize:13,fontWeight:600,color:"#c9a84c"}}>{selCust.carModel}</div>
            </NF>
          </>
        )}

        <NF label="작업내용">
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {SERVICES.map(s=>(
              <button key={s} onClick={()=>toggle(s)}
                style={{...chipBase,borderColor:services.includes(s)?"#c9a84c":"#2a2830",
                  background:services.includes(s)?"#c9a84c22":"#1a1a24",
                  color:services.includes(s)?"#c9a84c":"#4a4540",
                  boxShadow:services.includes(s)?"0 0 8px #c9a84c33":"none"}}>{s}</button>
            ))}
          </div>
        </NF>

        <NF label="가격">
          <input type="number" placeholder="예: 80000" value={amount} onChange={e=>setAmount(e.target.value)} style={inputStyle}/>
          {amount&&<span style={{fontSize:12,color:"#c9a84c",fontWeight:700,marginTop:5,display:"block",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:0.5}}>{formatKRW(amount)}</span>}
        </NF>

        <NF label="결제구분">
          <div style={{display:"flex",gap:7}}>
            {PAYMENTS.map(p=>(
              <button key={p} onClick={()=>setPayment(p)}
                style={{...chipBase,borderColor:payment===p?"#c9a84c":"#2a2830",
                  background:payment===p?"#c9a84c22":"#1a1a24",
                  color:payment===p?"#c9a84c":"#4a4540"}}>{p}</button>
            ))}
          </div>
        </NF>

        <NF label="비고">
          <textarea value={memo} onChange={e=>setMemo(e.target.value)} placeholder="특이사항..."
            style={{...inputStyle,minHeight:60,resize:"vertical"}}/>
        </NF>

        <div style={{display:"flex",gap:10,marginTop:12}}>
          {ex&&<button onClick={()=>{if(window.confirm("삭제할까요?"))onDelete(ex.id);}}
            style={{padding:"12px 14px",background:"#e0555522",color:"#e05555",border:"1px solid #e0555544",
              borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>삭제</button>}
          <button onClick={handleSave}
            style={{flex:1,padding:"13px",background:"linear-gradient(135deg,#c9a84c,#e8c96a)",
              color:"#0a0a0f",border:"none",borderRadius:10,fontSize:14,fontWeight:900,cursor:"pointer",
              boxShadow:"0 4px 16px #c9a84c44",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>
            SAVE
          </button>
        </div>
      </div>
    </div>
  );
}

// ── 고객 모달 ────────────────────────────────────────
function CustomerModal({customer,records,onSave,onDelete,onClose}){
  const [name,setName]=useState(customer?.name||"");
  const [phone,setPhone]=useState(customer?.phone||"");
  const [carModel,setCarModel]=useState(customer?.carModel||"");
  const [bookingType,setBookingType]=useState(customer?.bookingType||"신규");
  const [memo,setMemo]=useState(customer?.memo||"");

  const inputStyle={width:"100%",padding:"10px 12px",border:"1px solid #2a2830",borderRadius:8,fontSize:13,boxSizing:"border-box",background:"#1a1a24",color:"#f0ece0"};
  const chipBase={padding:"6px 12px",borderRadius:8,border:"1px solid",fontSize:12,cursor:"pointer",fontWeight:600};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:100,
      display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:"#111118",borderRadius:"20px 20px 0 0",padding:20,width:"100%",
        maxWidth:520,maxHeight:"92vh",overflowY:"auto",
        borderTop:"1px solid #c9a84c44",boxShadow:"0 -8px 40px rgba(0,0,0,0.6)"}} onClick={e=>e.stopPropagation()}>
        <div style={{width:40,height:3,background:"linear-gradient(90deg,#c9a84c,#e8c96a)",borderRadius:2,margin:"0 auto 16px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,color:"#c9a84c"}}>
            {customer?"EDIT CLIENT":"NEW CLIENT"}
          </span>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#4a4540"}}>✕</button>
        </div>

        <NF label="고객명 *"><input value={name} onChange={e=>setName(e.target.value)} placeholder="홍길동" style={inputStyle}/></NF>
        <NF label="연락처 *"><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="010-0000-0000" style={inputStyle}/></NF>
        <NF label="차종"><input value={carModel} onChange={e=>setCarModel(e.target.value)} placeholder="아반떼, 포르쉐 911 등" style={inputStyle}/></NF>

        <NF label="예약구분">
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {BOOKING_TYPES.map(bt=>{const c=BT[bt];return(
              <button key={bt} onClick={()=>setBookingType(bt)}
                style={{...chipBase,borderColor:bookingType===bt?c.color:"#2a2830",
                  background:bookingType===bt?c.bg:"#1a1a24",color:bookingType===bt?c.color:"#4a4540"}}>{bt}</button>
            );})}
          </div>
        </NF>

        <NF label="메모"><textarea value={memo} onChange={e=>setMemo(e.target.value)} placeholder="특이사항 등..."
          style={{...inputStyle,minHeight:60,resize:"vertical"}}/></NF>

        {records&&records.length>0&&(
          <NF label={`방문이력 · ${records.length}건`}>
            <div style={{maxHeight:140,overflowY:"auto",border:"1px solid #1a1a24",borderRadius:8}}>
              {[...records].sort((a,b)=>b.date.localeCompare(a.date)).map(r=>(
                <div key={r.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 12px",
                  borderBottom:"1px solid #1a1a24",gap:6,alignItems:"center"}}>
                  <span style={{fontSize:11,color:"#6a6460"}}>{r.date} {r.slot}</span>
                  <span style={{fontSize:10,color:"#4a4540",flex:1,textAlign:"center"}}>{(r.services||[]).join(", ")}</span>
                  <span style={{fontSize:11,fontWeight:700,color:"#c9a84c"}}>{formatKRW(r.amount)}</span>
                </div>
              ))}
            </div>
          </NF>
        )}

        <div style={{display:"flex",gap:10,marginTop:16}}>
          {customer&&<button onClick={()=>{if(window.confirm("삭제할까요?"))onDelete(customer.id);}}
            style={{padding:"12px 14px",background:"#e0555522",color:"#e05555",border:"1px solid #e0555544",
              borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>삭제</button>}
          <button onClick={()=>{if(!name||!phone)return alert("이름과 연락처를 입력해주세요.");
            onSave({id:customer?.id,name,phone,carModel,bookingType,memo});}}
            style={{flex:1,padding:"13px",background:"linear-gradient(135deg,#c9a84c,#e8c96a)",
              color:"#0a0a0f",border:"none",borderRadius:10,fontSize:14,fontWeight:900,cursor:"pointer",
              boxShadow:"0 4px 16px #c9a84c44",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>
            SAVE
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
